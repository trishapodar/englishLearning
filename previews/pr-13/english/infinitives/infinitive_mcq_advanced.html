      "Associate infinitival relatives with modality: whenever 'who should/could/might + V' can paraphrase 'to + V' in a post-nominal position, the infinitive carries modal meaning.",
      "Recognise the typical nouns that take infinitival relatives: those with deontic or dispositional meaning (person, place, thing, time, reason, way) combined with ordinals and superlatives.",
      "Test the modal paraphrase: 'She was the first person to arrive' ≈ 'the first person who was to arrive/who arrived first'. The infinitival version adds an element of expectation."
    ],
    "traps": [
      "Examiners claim the infinitival relative is a pure tense marker (future reference) rather than a modal marker; choosing 'future' as the answer ignores sentences like 'She was the last person to leave' where the matrix verb is past.",
      "The claim that infinitival and finite relatives are semantically identical is offered as a distractor; students who have not analysed the modal dimension will accept this incorrectly."
    ]
  },
  "Bare Infinitive after Causatives vs Passivisation": {
    "w": "7-9%",
    "tips": [
      "Learn the passivisation pattern for each causative separately: 'make → was made to + V'; 'have' has no standard passive in causative sense; 'let → was allowed to + V' (paraphrase, not passivisation).",
      "Test passivisation acceptability: if passivising a causative produces an awkward or unacceptable result, use the 'allow/permit' paraphrase instead.",
      "Note that in the passive of 'make', 'to' is inserted before the infinitive: 'He made her cry' → 'She was made to cry'. This 'to' is absent in the active."
    ],
    "traps": [
      "Applying the 'make → was made to' rule to 'let' ('was let to escape') is the primary trap; students must know that 'let' blocks passivisation entirely in its permissive sense.",
      "Offering 'was let escape' (bare infinitive retained in passive) as a plausible option tests whether students know this construction is widely unacceptable, not merely stylistically marked."
    ]
  },
  "Infinitive in Absolute Constructions": {
    "w": "5-6%",
    "tips": [
      "Memorise the standard conventionalised absolute infinitives: to be honest, to be frank, to tell the truth, to sum up, to put it mildly/simply/differently, to begin with, to be fair. These are exempt from the co-reference rule.",
      "For non-conventionalised infinitive adverbials, apply the co-reference check: the implied subject of the infinitive must match the grammatical subject of the matrix clause.",
      "Note that absolute infinitive adverbials always modify the entire proposition (sentence adverbials), not a single constituent; they are set off by commas."
    ],
    "traps": [
      "A non-conventionalised infinitive adverbial with a mismatched implied subject is offered as grammatically equivalent to a conventionalised one ('To applying for the job, your resume must be ready' is not exempt from the co-reference rule).",
      "The perfect progressive form ('to having been frank') is inserted as a plausible option for an absolute infinitive; absolute infinitives are invariably simple to-infinitives."
    ]
  },
  "Infinitive and Nominalization": {
    "w": "5-7%",
    "tips": [
      "For meaning-changing verbs (forget, remember, stop, try, regret), nominalising the infinitive complement as a gerundive noun phrase shifts the temporal orientation from prospective to retrospective.",
      "Test semantic equivalence by considering the time-frame: 'forgot to lock' (the locking did not happen) vs 'forgot the locking' (a locking happened and was forgotten). These are opposite meanings.",
      "For verbs with no meaning change between gerund and infinitive (begin, start, continue), nominalisation is semantically neutral."
    ],
    "traps": [
      "Examiners present a nominalisation of a meaning-changing verb and ask whether the meaning is preserved; students who have not internalised the prospective/retrospective distinction will incorrectly say 'yes'.",
      "A nominalisation that adds 'the' + gerund-noun ('the solving', 'the leaving') is placed alongside the original infinitive; students must judge semantic equivalence precisely, not just grammatical acceptability."
    ]
  },
  "Dangling and Misrelated Infinitives": {
    "w": "6-8%",
    "tips": [
      "Apply the co-reference test to every non-finite infinitive adverbial: identify the implicit subject of the infinitive and confirm it matches the grammatical subject of the matrix clause.",
      "Learn that conventionalised absolute infinitives (to be honest, to sum up) are exempt from the co-reference requirement; do not classify these as dangling.",
      "Repair dangling infinitives by restructuring the matrix clause to promote the correct referent to subject position: 'To qualify, you must apply' instead of 'To qualify, an application must be submitted'."
    ],
    "traps": [
      "A dangling infinitive whose intended meaning is contextually recoverable is presented as 'correct'; students must apply the structural co-reference rule, not merely check for recoverable meaning.",
      "Conventionalised absolute infinitives are placed alongside dangling non-conventionalised ones; students who know the absolute infinitive exemption may incorrectly extend it to non-conventionalised structures."
    ]
  },
  "Infinitive as Appositive": {
    "w": "5-6%",
    "tips": [
      "Identify the nouns that typically take appositive infinitives: ambition, goal, aim, desire, intention, decision, plan, promise, tendency, instinct. These are abstract deverbal or relational nouns.",
      "Test for appositive function by substituting a 'that'-clause: 'Her ambition, to become a pianist' ↔ 'Her ambition, that she should become a pianist'. Grammatical substitution confirms apposition.",
      "Distinguish appositive infinitives (commas present, defines abstract noun) from infinitival relatives (no commas, restricts head noun) by asking whether the head noun is already fully identified."
    ],
    "traps": [
      "Examiners classify an appositive infinitive as a relative clause; the distinction hinges on the abstractness of the head noun and whether the infinitive defines content versus restricts reference.",
      "A purpose infinitive and an appositive infinitive are presented in the same sentence ('Her goal to win the prize drove her training'); students must determine whether 'to win' is defining the goal (appositive) or giving purpose (adverbial)."
    ]
  },
  "Infinitive vs Finite Clause after 'Help'": {
    "w": "5-7%",
    "tips": [
      "Memorise 'help' as the only causative that accepts both bare and to-infinitive after its object: 'helped him carry', 'helped him to carry', 'helped carry', 'helped to carry' are all standard.",
      "Do not extend this dual acceptability to any other causative (make, let, have, get): apply their specific rules strictly.",
      "Note that 'get + NP + to-infinitive' (not bare infinitive) is the formal pattern: 'get him to work' (not 'get him work'). 'Get' is sometimes grouped with causatives but follows a different pattern."
    ],
    "traps": [
      "A question gives 'helped him to carry' and asks students to mark it correct or incorrect; students who have over-applied the 'causatives take bare infinitive only' rule will incorrectly mark it wrong.",
      "'Get + NP + bare infinitive' is offered alongside 'help + NP + bare infinitive' to test whether students know that 'get' requires 'to' while 'help' accepts both."
    ]
  },
  "Aspectual Verbs and the Infinitive": {
    "w": "6-7%",
    "tips": [
      "Classify verbs into three groups: those that always take gerund (enjoy, avoid, finish), those that always take infinitive (want, hope, decide), and aspectual verbs that take both (begin, start, continue, cease) with no or minimal meaning change.",
      "Remember the stativity preference: after aspectual verbs, stative predicates prefer the to-infinitive ('began to understand', 'continued to believe') over the gerund.",
      "Do not confuse 'stop + gerund' (cease an activity) with 'stop + to-infinitive' (pause in order to do something else); this is a meaning-changing pair, not an aspectual verb pattern."
    ],
    "traps": [
      "Examiners conflate the 'stop' meaning-change pair with the 'continue/begin' near-synonym pair in the same question to see whether students can distinguish meaning-changing from non-meaning-changing pairs.",
      "A question asserts that 'continued + to-infinitive' is non-standard; students who know only the gerund rule will accept this false assertion."
    ]
  },
  "Infinitive in Conditional Inversion": {
    "w": "6-8%",
    "tips": [
      "Memorise the three inverted conditional structures: (1) 'Were + S + to + bare infinitive' (hypothetical present/future); (2) 'Had + S + past participle' (counterfactual past); (3) 'Should + S + bare infinitive' (remote future possibility).",
      "Confirm that 'were' in inverted conditionals is always subjunctive, never indicative 'was', regardless of person or number: 'Were I', 'Were he', 'Were they' — all correct.",
      "Practise converting from 'if'-clause to inverted form and back: 'If he were to resign' ↔ 'Were he to resign'. The bare infinitive after 'to' must be retained unchanged."
    ],
    "traps": [
      "Substituting indicative 'was' for subjunctive 'were' in the inverted form ('Was he to resign') is the primary trap; examiners know this conflation is common even among advanced learners.",
      "Replacing the bare infinitive with a gerund ('Were he resigning') or dropping 'to' ('Were he resign') are secondary traps testing each component of the 'were + S + to + bare infinitive' construction independently."
    ]
  }
}
