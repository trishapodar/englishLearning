      "Know the exceptions to backshift: (1) universal truths ('She said water boils at 100°C'), (2) states still true at time of reporting, (3) news or broadcast reporting conventions.",
      "Practise converting between direct and indirect speech systematically, tracking pronoun, tense, and time-adverbial changes simultaneously."
    ],
    "traps": [
      "Students often backshift modal 'would' to 'would', 'could' to 'could', and 'might' to 'might'—these forms do NOT backshift further because they are already the past/remote forms of their modals.",
      "Time adverbials must also shift in reported speech: 'today' → 'that day'; 'yesterday' → 'the day before/the previous day'; 'tomorrow' → 'the following day'; 'here' → 'there'."
    ]
  },
  "Pseudo-Copular and Complex Copular Constructions": {
    "w": "6-8%",
    "tips": [
      "Build a full inventory of pseudo-copular verbs grouped by meaning: result (become, prove, turn out, come, go, fall), appearance (seem, appear, look), continuation (remain, stay, keep), perception (feel, smell, taste, sound, look).",
      "Distinguish pseudo-copular verbs (take only subject complements) from complex transitive verbs (take both object and object complement): 'The soup smells good' (pseudo-copular) vs. 'She found the soup good' (complex transitive).",
      "Test whether a verb is pseudo-copular by replacing it with 'be': if the sentence retains its basic meaning, it is pseudo-copular."
    ],
    "traps": [
      "The same verb can be pseudo-copular or action/transitive in different constructions: 'She looks tired' (pseudo-copular) vs. 'She looks at the board' (intransitive action). The presence of an adjective complement vs. a prepositional complement is the distinguishing feature.",
      "'Proved' as pseudo-copular ('The plan proved disastrous') is frequently misanalysed as a transitive verb because of its association with the construction 'prove a point'."
    ]
  },
  "Verb Tenses – Future Forms": {
    "w": "8-10%",
    "tips": [
      "Learn all six future forms: will (pure prediction/volition), be going to (prior intention/evidence-based prediction), present continuous (arranged future), present simple (scheduled future), future perfect (completed before future point), future continuous (in progress at a future point).",
      "The future perfect trigger: 'by (the time / next week / then)' almost always requires future perfect, not simple future.",
      "Distinguish future perfect simple ('will have completed'—completion by a future point) from future perfect continuous ('will have been working'—duration up to a future point)."
    ],
    "traps": [
      "Students use simple future ('will leave') where future perfect ('will have left') is required when a completion-before-future-reference-point meaning is needed. The word 'by' before a future expression is an almost infallible future perfect trigger.",
      "Future perfect continuous sounds unnatural in many contexts where future perfect simple is preferred. 'Will have been leaving' for a point event like 'departure' is semantically odd; only durative activity verbs work naturally in the future perfect continuous."
    ]
  },
  "Reported Speech and Speech Acts": {
    "w": "8-10%",
    "tips": [
      "Match the reporting verb to the original speech act: statements (said/told), questions (asked/enquired), imperatives (told/asked/ordered/urged/warned), offers (offered), suggestions (suggested), promises (promised/assured).",
      "For questions in indirect speech: yes/no questions use 'if/whether + subject + verb'; wh-questions use the wh-word + subject + verb (NOT inverted word order).",
      "Learn the full range of performative reporting verbs and their complementation patterns: 'admitted + -ing/that', 'denied + -ing/that', 'refused + to-infinitive', 'agreed + to-infinitive/that'."
    ],
    "traps": [
      "Indirect questions require statement word order (if/whether + S + V), not question inversion. 'She asked where was he going' is wrong; 'She asked where he was going' is correct.",
      "Imperatives must be reported with 'tell/ask/order + object + to-infinitive', NOT with 'said + that + past tense'. 'He said me to come' and 'He said that I came' are both wrong for reporting 'Come here.'"
    ]
  },
  "Participial Clauses and Dangling Participles": {
    "w": "8-10%",
    "tips": [
      "A participial phrase must logically modify the GRAMMATICAL SUBJECT of the main clause. The test: ask 'Who/what is [participle]-ing?' and verify the answer is the main clause subject.",
      "Distinguish absolute participial constructions (with their own subject: 'Weather permitting, we will go') from dangling participials (no overt subject, defaulting to—but not matching—the main clause subject).",
      "Learn conventional 'dangling' constructions that are grammatically accepted by long usage: 'Broadly speaking', 'Generally taking', 'Considering everything', 'Judging by the results'."
    ],
    "traps": [
      "Dangling participials are not always obviously absurd. 'Walking down the street, the buildings looked magnificent' is the most commonly missed type because it is aesthetically plausible. Always perform the subject-matching test mechanically.",
      "Passive participial phrases ('Written in haste, the letter contained errors') are often miscorrected as dangling because students confuse agent suppression in passive participles with absent subjects."
    ]
  },
  "Inversion with Negative Adverbials": {
    "w": "8-10%",
    "tips": [
      "Memorise the full list of inversion-triggering negative/restrictive adverbials: never, rarely, seldom, hardly, scarcely, barely, not only, no sooner, little, under no circumstances, at no time, in no way, only then, only after, only when.",
      "If there is no auxiliary in the original sentence, insert 'do/does/did' in the inverted form: 'Rarely does she complain' (not *'Rarely she complains').",
      "Distinguish subject-auxiliary inversion (after fronted negative adverbials) from subject-verb inversion (after fronted locative/directional expressions: 'Down fell the soldier')."
    ],
    "traps": [
      "'Hardly' and 'scarcely' trigger inversion AND require 'when/before' (not 'than') in the following clause: 'Hardly had she sat down WHEN the phone rang' (not 'than').",
      "'No sooner' takes 'than' (not 'when'): 'No sooner had he arrived THAN it started raining.' This distinction between 'hardly/scarcely + when' and 'no sooner + than' is a precision test in advanced examinations."
    ]
  },
  "Lexical vs. Grammatical Aspect": {
    "w": "6-8%",
    "tips": [
      "Distinguish lexical aspect (Aktionsart—the inherent temporal structure of the verb's meaning) from grammatical aspect (the speaker's choice to present an event as complete, ongoing, or both).",
      "Lexical aspect is encoded in the verb itself; grammatical aspect is superimposed via morphology and auxiliaries. A verb's Aktionsart class can interact with—and sometimes resist—certain grammatical aspectual forms.",
      "Apply the pragmatic vs. grammatical distinction: some combinations are grammatically well-formed but pragmatically unusual. Identify whether the oddness of a sentence is a rule violation or a contextual infelicity."
    ],
    "traps": [
      "Diagnosing a grammatical error where there is only pragmatic infelicity is a common advanced-level mistake. 'She knew the answer for years' is grammatically valid but pragmatically marked; it is not ungrammatical.",
      "The progressive with stative verbs ('I am knowing') is grammatically unacceptable; pairing a state verb with a duration adverbial in simple past is not. These two phenomena must not be conflated."
    ]
  },
  "Periphrastic vs. Inflectional Verb Forms": {
    "w": "6-8%",
    "tips": [
      "Categorise English verbal morphology: inflectional categories are TENSE (past -ed for regular verbs), AGREEMENT (3rd person singular -s), and ASPECT (-ing participial form). Perfect and progressive ASPECT are periphrastic.",
      "Remember that English has NO inflectional future tense—future meaning is always expressed periphrastically (will, be going to, present continuous, etc.).",
      "Understand that modal auxiliaries are morphologically DEFECTIVE: they have no -s form, no -ing form, no -ed form, and no infinitival form. Their so-called 'past' forms (could, would, might, should) express modality and hypotheticality, not simple past time."
    ],
    "traps": [
      "Students assume modals have standard tense forms: 'could' does NOT reliably mean past 'can'. 'Could' can express past ability, hypothetical present/future possibility, or polite request depending on context.",
      "Distinguishing the '-ed' past tense inflection from the '-ed' past participle is critical: both look identical for regular verbs but have different grammatical functions (past tense = inflectional tense; past participle = component of periphrastic perfect or passive)."
    ]
  },
  "Negation and Verb Phrases": {
    "w": "6-8%",
    "tips": [
      "Learn the standard rule for negation placement in English: 'not' immediately follows the first auxiliary verb, or 'do/does/did' is inserted if no auxiliary is present.",
      "Study neg-raising verbs (think, believe, suppose, expect, imagine, want, seem, appear) and how negation placed in the matrix clause is semantically interpreted in the embedded clause.",
      "Distinguish neg-raising (syntactic) from simple denial of the matrix predicate: 'I don't think she is lying' (neg-raising: I think she is not lying) vs. 'I don't know she is lying' (straightforward negation: I lack the knowledge)."
    ],
    "traps": [
      "Not all matrix negations are neg-raising. 'I don't know she is honest' is NOT neg-raised ('I know she is not honest' would be semantically different). Only specific cognitive-state and perception verbs trigger neg-raising.",
      "Students interpret 'I don't think he will come' as strong uncertainty, when pragmatically it is closer to 'I think he will not come'—the neg-raising interpretation is the dominant pragmatic reading for high-frequency neg-raising verbs."
    ]
  }
}
