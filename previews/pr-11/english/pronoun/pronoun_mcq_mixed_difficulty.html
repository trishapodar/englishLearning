      "ANTICIPATORY 'IT': placeholder for a postponed infinitive or clause: 'It is important to read' = 'To read is important'. Test: can you move the following phrase to subject position?",
      "DUMMY 'IT': weather, time, distance expressions with no real subject: 'It is raining', 'It is 3 o’clock', 'It is ten miles away'.",
      "Distinguish: dummy 'it' has NO real subject to replace; anticipatory 'it' HAS a real subject that follows later in the sentence."
    ],
    "traps": [
      "Classifying all non-referential 'it' as dummy 'it' — if a clause or infinitive follows the predicate, 'it' is anticipatory, not dummy.",
      "Treating anticipatory 'it' as a pronoun with an antecedent — it has no antecedent; it is a grammatical placeholder."
    ]
  }
}
