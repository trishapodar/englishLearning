      "In complex sentences, evaluate each pronoun separately against its own antecedent — a sentence with three pronouns may have two correct and one erroneous, and that one error is the testable item.",
      "Number agreement must hold across the entire sentence: if a noun is singular at first mention, all subsequent pronouns referring to it must also be singular.",
      "Be especially alert to pronoun shifts at clause boundaries — examiners often embed errors at the juncture between main and subordinate clauses."
    ],
    "traps": [
      "Passages that are grammatically intelligible overall are used to conceal a single pronoun without an antecedent — students who read for meaning rather than structure will pass over the error.",
      "Multiple pronouns of different persons and numbers appearing in a single sentence are used to overwhelm students' tracking capacity — isolate and trace each pronoun individually."
    ]
  },
  "Indefinite Pronouns — None Singular vs Plural": {
    "w": "5-7%",
    "tips": [
      "Know that 'none' is a variable indefinite pronoun: singular when its sense is 'not one' (especially with uncountable or singular nouns), plural when its sense is 'not any' (especially with countable plural nouns).",
      "Cite the prepositional phrase following 'none of' to guide your choice: 'none of the water' (uncountable) takes singular; 'none of the witnesses' (countable plural) may take plural.",
      "Recognise that the strict 'none = always singular' prescription is historically and descriptively unsupported — modern formal style guides acknowledge variable agreement."
    ],
    "traps": [
      "Options citing the 'none = not one = always singular' rule as definitive are presented to test whether students know this is a disputed prescription, not an absolute rule.",
      "Sentences with uncountable nouns after 'none of' are presented alongside countable-noun versions to test whether students apply number sensitivity rather than a blanket rule."
    ]
  },
  "Pronoun Case — Infinitive Subjects": {
    "w": "6-8%",
    "tips": [
      "Memorise the accusative-plus-infinitive pattern: in '[verb] + [pronoun] + to + [infinitive]', the pronoun is always in the objective case because it is simultaneously the object of the main verb and the logical subject of the infinitive.",
      "Test by removing the infinitive: 'The director wanted her' — the pronoun is clearly the object of 'wanted'. Reinserting the infinitive does not change the case.",
      "Apply this rule even in compound infinitive subjects: all pronouns before the infinitive must be objective ('her and her colleague to present'), not subjective."
    ],
    "traps": [
      "Sentences where the logical 'doer' of the infinitive action is the pronoun lead students to use the subjective case, not recognising that the governing verb controls the case.",
      "The option using a 'that'-clause subjunctive ('wanted that she present') is presented alongside the accusative-plus-infinitive to see if students distinguish the two grammatical frames."
    ]
  },
  "Pronoun Shift — Impersonal Constructions": {
    "w": "5-7%",
    "tips": [
      "When 'one' is chosen as the impersonal subject, maintain 'one' and 'one's' throughout the entire discourse unit — never switch to 'you', 'we', or 'they'.",
      "Recognise that 'you' and 'one' are not interchangeable mid-sentence — they represent different grammatical persons and their co-occurrence in the same clause constitutes a pronoun shift error.",
      "When recasting impersonal sentences for clarity, choose a consistent frame at the outset: either 'one', 'you', 'we', or a generic noun ('a candidate', 'a lawyer') and maintain it."
    ],
    "traps": [
      "Sentences beginning formally with 'one' and ending with 'you' are structured so that each half sounds natural in isolation — students who read each clause separately miss the shift between them.",
      "Options with 'one...they' shifts are included alongside 'one...you' shifts to test whether students recognise both as errors or only the more common 'one...you' variety."
    ]
  },
  "Relative Pronouns — 'Which' with Prepositional Antecedents": {
    "w": "6-8%",
    "tips": [
      "Immediately after 'which', ask: what specific noun does 'which' refer to? If the answer is 'the whole situation described in the previous clause', it is a broad reference error.",
      "Repair broad reference by inserting an explicit noun: 'She revised the budget, a decision which...' or 'She revised the budget, which revision...' — both supply a noun antecedent for 'which'.",
      "Distinguish between 'which' with broad reference (error) and 'which' in a properly formed non-restrictive clause with a noun antecedent (correct)."
    ],
    "traps": [
      "Sentences with 'which' following a complete clause are presented alongside sentences with 'which' following a specific noun, testing whether students can tell the two patterns apart.",
      "Word order variations ('which all were' vs 'all of which were') are used to test whether students recognise the non-standard placement of a quantifier within a relative clause."
    ]
  },
  "Pronoun-Antecedent Agreement — Generic Singular": {
    "w": "6-8%",
    "tips": [
      "Know the three main formal strategies for generic singular reference: generic masculine (historically standard, now considered gender-exclusive), 'his or her' (conservative formal), and singular 'they' (modern standard accepted by major style guides).",
      "For formal legal and official documents, 'his or her' remains the most conservative and unambiguous option — note this register sensitivity when answering questions specifying a document type.",
      "Evaluate the register specified in the question — 'formal legal document' may call for 'his or her' even if singular 'they' is broadly acceptable in other formal contexts."
    ],
    "traps": [
      "Questions specify 'formal legal document' but present singular 'they' as the obviously correct modern answer, trapping students who do not read the register specification.",
      "The recasting-to-plural strategy (option D) is presented as a clean solution, but the question tests register-specific formal drafting knowledge, not general best-practice revision."
    ]
  },
  "Pronoun Case — 'Let' + Pronoun Constructions": {
    "w": "4-6%",
    "tips": [
      "Remember that 'let' is a transitive verb and its complement (the pronoun immediately following it) must be in the objective case: 'let him', 'let her', 'let us', 'let them'.",
      "Do not confuse 'let' + objective pronoun with the relative clause that may follow the pronoun — the relative clause 'who is...' takes 'who' in the subjective case because it is the subject of its own clause.",
      "Compound objects of 'let' must both be in the objective case: 'let her and me', never 'let she and I' or 'let he and I'."
    ],
    "traps": [
      "Archaic or Biblical-sounding constructions ('Let he who...') exploit the elevated register to make the subjective case seem more appropriate, when in fact 'let' always governs the objective.",
      "Compound objects of 'let' with mixed-case pronouns are presented so that one pronoun is correct (objective) and the other is not, testing whether students evaluate each pronoun independently."
    ]
  },
  "Pronoun Reference — Cataphora": {
    "w": "5-7%",
    "tips": [
      "Cataphora (pronoun before antecedent) is licensed in English only when the pronoun is in a subordinate clause and the antecedent is in the main clause — this is the structural condition.",
      "When the pronoun is in the main clause and the antecedent is in the subordinate clause, cataphora is not structurally licensed and the sentence is awkward or defective.",
      "Right-dislocation ('It is magnificent, the sunset') is a separate construction where cataphora is licensed at the sentence's end — learn to distinguish it from mid-sentence pronoun-before-antecedent patterns."
    ],
    "traps": [
      "All four options in a question may use cataphora, testing whether students can identify which structural arrangement licenses cataphora and which does not.",
      "Right-dislocation and embedded cataphora are presented together to test whether students distinguish the two constructions or reject all pronoun-before-antecedent patterns as errors."
    ]
  },
  "Pronoun Case — 'Than' as Conjunction vs Preposition": {
    "w": "6-8%",
    "tips": [
      "In formal examination contexts, treat 'than' as a subordinating conjunction — the pronoun following it is the subject or object of an elliptical clause, not the object of a preposition.",
      "Know that descriptive grammarians accept 'than' as a preposition in some registers, but formal examination grammar consistently applies the conjunction analysis and requires the subjective case when the pronoun is a subject.",
      "Always restore the elliptical clause to determine case; do not rely on which form 'sounds right' in speech."
    ],
    "traps": [
      "Questions frame the dispute between prescriptive and descriptive analysis to see whether students know which standard applies in formal examination contexts.",
      "Options endorsing the descriptive/preposition analysis as universally correct are presented alongside options overstating the prescriptive rule, testing nuanced awareness of register-specific standards."
    ]
  },
  "Possessive Pronoun — 'Whose' with Inanimate Antecedents": {
    "w": "5-7%",
    "tips": [
      "Commit to memory: 'whose' is grammatically licensed for both animate and inanimate antecedents — this is not a stylistic preference but a grammatical fact supported by every major formal authority.",
      "Know that 'of which' and 'whose' are both correct for inanimate nouns; 'whose' is often more idiomatic; 'of which' is more formal but less fluent.",
      "Never attempt to form 'of which's' or 'that's' as alternatives — both are non-standard constructions that do not exist in English grammar."
    ],
    "traps": [
      "A legal or academic framing is used to make 'of which' seem obligatory for inanimate nouns — students who know the inanimate restriction myth will choose the circumlocutory 'of which' over the correct 'whose'.",
      "The option declaring both 'whose' and 'of which' correct (but without clarifying the myth) is presented as 'incomplete' to test whether students can distinguish between a full and partial correct answer."
    ]
  },
  "Pronoun Case — Interrogative 'Who/Whom' with Complex Verb Phrases": {
    "w": "7-9%",
    "tips": [
      "Identify all parenthetical insertions in a question ('do you think', 'do you believe', 'do you suppose') and bracket them before applying the who/whom test.",
      "After stripping the parenthetical, apply the substitution test to the remaining clause: 'he/she' = 'who'; 'him/her' = 'whom'.",
      "Remember that overcorrection (using 'whom' where 'who' is required because the parenthetical makes an object relationship seem plausible) is tested just as frequently as undercorrection."
    ],
    "traps": [
      "Sentences with parentheticals of varying complexity (short: 'do you think'; longer: 'does the board believe it is') are used to increase the difficulty of identifying and stripping the parenthetical.",
      "Options presenting 'whom' after parentheticals where 'who' is required are designed to exploit the widespread overcorrection pattern among high-scoring students who know the who/whom rule but misapply it under pressure."
    ]
  },
  "Pronoun Agreement — 'Either...Or' with Mixed-Person Antecedents": {
    "w": "5-7%",
    "tips": [
      "In 'either...or' and 'neither...nor' constructions, apply the proximity rule: the verb and all subsequent pronouns agree with the nearer antecedent.",
      "When the antecedents are of different grammatical persons, this creates agreement that may sound unusual — 'Either you or I must submit my application' is correct but sounds awkward; rearranging places the more natural-sounding agreement at the nearer position.",
      "As a drafting strategy, place the first-person pronoun last so that the agreement ('my', 'I') is natural: 'Either you or I [must submit my]' is grammatically correct."
    ],
    "traps": [
      "Mixed-person 'either...or' sentences with plural or inclusive pronouns ('our', 'their') are presented to test whether students default to collective agreement rather than the proximity rule.",
      "Correctly ordered and reversely ordered versions of the same sentence are both presented — students must apply the proximity rule freshly to each without assuming the same answer applies to both."
    ]
  },
  "Pronoun Reference — Discourse Anaphora": {
    "w": "6-8%",
    "tips": [
      "Evaluate pronoun reference across full passages, not just within individual sentences — discourse-level errors arise from inconsistency between sentences.",
      "Track how each noun is introduced and subsequently pronominalized: if a collective noun is treated as plural in one sentence ('they') and singular in the next ('it'), the discourse has an internal inconsistency.",
      "Use a mental pronoun map: list every pronoun in a multi-sentence passage and trace each to its antecedent, checking person, number, and consistency across the passage."
    ],
    "traps": [
      "Passages with only one pronoun error embedded among several grammatically clean sentences are designed to test sustained attention — students who check only the first or last sentence will miss it.",
      "Broad reference ('This was a landmark decision') is presented as an error in one option and a minor stylistic issue in another, testing whether students can rank severity of pronoun errors."
    ]
  },
  "Pronoun — 'It' in Cleft and Pseudo-Cleft Constructions": {
    "w": "6-8%",
    "tips": [
      "Memorise the cleft template: 'It + be + [focused element] + who/that + [relative clause with gap]'. The gap is obligatory — the position corresponding to the focused element must be empty in the relative clause.",
      "Test for the gap: remove the focused element and see if the relative clause has a missing subject or object position — 'who filed the motion' (gap at subject = correct) vs 'who he filed the motion' (no gap, resumptive pronoun = wrong).",
      "Distinguish the cleft ('It is X that...') from the pseudo-cleft ('What X did was...') and the extraposition ('It is clear that...') — all involve 'it' but with different structural properties."
    ],
    "traps": [
      "Cleft constructions with resumptive pronouns inside the relative clause are presented as formal-sounding emphatic constructions — students must recognise that English clefts are anti-resumptive, unlike some other languages.",
      "The focused element and the relative clause subject or object are made to match in number and gender so that the resumptive pronoun feels natural, exploiting L1-transfer intuitions of multilingual students."
    ]
  }
