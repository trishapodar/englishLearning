      "Seasons with post-modifiers are placed next to seasons without: 'the summer of the war' (correct 'the') vs 'summer is hot here' (correct zero article) — testing context sensitivity."
    ]
  },
  "Articles in Parallel Structures": {
    "w": "5-6%",
    "tips": [
      "In 'X and Y' coordinate structures, repeating the article signals two distinct entities; omitting the second article can signal a single entity with two characteristics or dual roles.",
      "For 'the X and Y' — if only one article is used and both nouns refer to two different people, ambiguity is created. For precision, use 'the X and the Y' for two people.",
      "Adjective compounds: 'a black and white photograph' (one photograph) vs 'a black and a white photograph' (two photographs). The article placement is the sole grammatical signal of quantity."
    ],
    "traps": [
      "A coordinate noun phrase is given where article repetition is tested — students must determine whether the intended meaning is one entity (one article) or two entities (two articles).",
      "Lists with mixed countable and uncountable nouns are given in one sentence: 'She brought a book, music, and an umbrella' — testing whether students know that uncountable 'music' correctly has no article while countable nouns have articles."
    ]
  },
  "Articles with Body Parts — Idiomatic and Syntactic Use": {
    "w": "4-5%",
    "tips": [
      "Physical contact idioms (hit on the head, pat on the back, look in the eye, stab in the arm) ALWAYS use 'the' before the body part, never a possessive pronoun.",
      "When body parts are used with possessive context NOT in a physical contact idiom, use the possessive pronoun: 'She raised her hand', 'He broke his leg' — here the possessive is correct.",
      "The distinction: idiom of physical contact (external action upon a body part) = 'the'; general body part reference with the person as agent = possessive pronoun."
    ],
    "traps": [
      "Students given 'She hit him on his head' and 'She hit him on the head' must identify which is idiomatic. The possessive feels natural but violates the fixed idiomatic structure.",
      "A sentence like 'The doctor examined him on the chest' (correct idiom) is placed beside 'He clutched his chest' (correct possessive) — testing whether students can apply both rules correctly in context."
    ]
  },
  "Articles with Countable Nouns — Predicative Use": {
    "w": "6-8%",
    "tips": [
      "After verbs of appointment — elect, appoint, name, designate, crown, choose, make, declare — when the noun refers to a UNIQUE office held by one person, use zero article: 'appointed director', 'crowned king', 'elected president'.",
      "If the office is NOT unique (more than one person holds it simultaneously), 'a/an' may be required: 'She was appointed a committee member' — there are many committee members, so 'a' is needed.",
      "The predicative zero-article rule is primarily British English formal usage. In American English, 'a' is sometimes retained: 'elected as a president' vs British 'elected president'. Competitive examinations in India follow British norms."
    ],
    "traps": [
      "Students are given 'She was made a manager' (correct — not a unique post, 'a' needed) alongside 'She was made chairman' (correct — unique post, zero article) and must determine which is right without additional context.",
      "A sentence with a unique post uses 'a' ('appointed a CEO') — students must identify the error, resisting the natural inclination to accept 'a' before a singular countable noun."
    ]
  },
  "Articles with Proper Nouns — Institutions and Organizations": {
    "w": "6-8%",
    "tips": [
      "University naming rule: 'Name + University' (Oxford University, Delhi University) = zero article; 'University of + Name' (the University of Oxford, the University of Delhi) = 'the' required.",
      "The same pattern applies to other institutions: 'Mumbai High Court' (zero article) vs 'the High Court of Mumbai' ('the' required); 'St John's Hospital' vs 'the Hospital of St John's'.",
      "International organisations: The United Nations, the World Bank, the International Monetary Fund — organisations whose names contain common nouns take 'the'."
    ],
    "traps": [
      "Students are given 'the Harvard University' (incorrect — Name + University pattern) and 'Harvard University' (correct) and must identify the error, which contradicts their expectation that named institutions always take 'the'.",
      "A question contrasts 'the University of Hyderabad' (correct — University of + Name) with 'the Hyderabad University' (incorrect — Name + University should have no 'the') to test whether students know the syntactic rule."
    ]
  },
  "Articles in Exclamatory Sentences": {
    "w": "4-5%",
    "tips": [
      "Master the 'What' exclamation formula: 'What a/an + adj + singular countable noun!' vs 'What + adj + uncountable noun!' vs 'What + adj + plural noun!' The article presence/absence reflects countability.",
      "The 'How' exclamation never uses an article before the adjective: 'How beautiful!' 'How strange she is!' Do not confuse 'How' and 'What' exclamatory structures.",
      "Test countability before applying the rule: Is the noun countable? If yes, singular → 'What a/an'; if plural → zero article. If uncountable → zero article. Get the countability right first."
    ],
    "traps": [
      "An uncountable noun is placed in a 'What a...' structure, and students must identify the error: 'What a lovely weather!' is wrong; 'What lovely weather!' is correct.",
      "Collective nouns and nouns with variable countability (e.g., 'experience' — countable 'an experience' vs uncountable 'experience') are used in 'What' exclamations to test whether students can determine countability in context."
    ]
  },
  "Articles with 'Same', 'Very', 'Only', 'Following'": {
    "w": "5-6%",
    "tips": [
      "Memorise the 'the-bound' adjectives/determiners: same, very (identity), only, following, latter, former, aforesaid, said (in legal English). These almost always appear with 'the'.",
      "Distinguish 'very' (adverb of degree — no article involved: 'very fast', 'very good') from 'very' (emphatic identity determiner — always with 'the': 'the very idea', 'the very person', 'the very thought').",
      "'The only' is nearly absolute in standard English. An attempt to use 'an only' (as in 'an only child') is a rare specific exception — 'an only child' means a child without siblings, not the same as 'the only child'."
    ],
    "traps": [
      "'An only child' (a child without siblings) vs 'the only child' (the sole child in a given context) are both correct but with different meanings — a trap for students who think 'only' always takes 'the'.",
      "A sentence uses 'very' as an intensifying determiner without 'the' ('She is very person I needed') — students must identify the missing 'the', knowing that emphatic 'very' is 'the-bound'."
    ]
  },
  "Articles with Directions and Compass Points": {
    "w": "4-5%",
    "tips": [
      "Three article patterns for compass directions: (1) Adverb of movement — zero article (drive north, sail east); (2) Regional noun — 'the' (in the north, the West, the south of the country); (3) Part of proper name — zero article (North Korea, South Africa, West Bengal).",
      "When a compass direction is modified by 'of + place', it becomes a regional noun and takes 'the': 'the north of India', 'the east of England', 'the south of France'.",
      "Capitalisation can signal: proper name (North Korea, West Bengal — no article) vs regional description (the north, the west — with article). Treat capitalised compass+country combinations as proper names."
    ],
    "traps": [
      "A proper name like 'West Bengal' or 'North India' (informal regional reference) is given in a sentence with 'the West Bengal' — students must identify that proper geographic names, even with compass directions, do not take 'the'.",
      "A sentence uses the adverb form without 'the' ('She lives in north of the city') where the regional noun form requiring 'the' is needed ('in the north of the city') — testing the adverb vs regional noun distinction."
    ]
  },
  "Articles with 'Of' Phrases — Partitive and Specific": {
    "w": "5-6%",
    "tips": [
      "Quantifying nouns with 'of + group': 'a number of', 'a group of', 'a majority of', 'a variety of', 'a proportion of' refer to a non-specific quantity of an unspecified group. 'The number of', 'the majority of', 'the group of' refer to a specific, identified set.",
      "A helpful signal: if the 'of + group' noun can be replaced by a specific count or reference ('the 30 students who attended' = 'the majority of the students'), use 'the'. If it means 'some unspecified number', use 'a'.",
      "Note: 'A number of students were present' takes a PLURAL verb (notional agreement); 'The number of students was high' takes a SINGULAR verb. Article choice and verb agreement are tested together."
    ],
    "traps": [
      "'A number of + plural noun + plural verb' vs 'The number of + plural noun + singular verb' is one of the most tested advanced collocations — article and agreement combined in a single item.",
      "Students confuse 'a variety of' (= several different kinds, zero specific reference) with 'the variety of' (= the specific variety/range already identified). Examiners present sentences where the context clearly demands 'the' but students choose 'a' by habit."
    ]
  },
  "Articles in Complex Sentence Structures": {
    "w": "5-6%",
    "tips": [
      "The 'a person of + quality' idiom (a woman of principle, a man of integrity, a person of great courage) always takes 'a/an'. These are categorising expressions, not specific identifications. Replacing 'a' with 'the' changes the meaning from 'someone who possesses this quality' to 'the specific known person'.",
      "In complex sentences, track article rules across clause boundaries. The post-modification rule crosses clauses: 'The support [that she provided] was invaluable' — the relative clause modifies 'support' in the main clause, making it definite.",
      "In academic and formal writing, articles before abstract nouns in complex sentences are the most error-prone area. When in doubt, identify whether the noun is generic (zero), post-modified (the), or introduced as one of a category (a/an)."
    ],
    "traps": [
      "'A woman of principle' vs 'the woman of principle she had always aspired to be' — both correct but with different articles because the second version has a post-modifying relative clause that makes the concept specific.",
      "A sentence uses 'the' before a quality-noun in 'a person of + quality' position — students must identify this as wrong without the distraction of other grammatical errors in the sentence."
    ]
  }
}
