<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Articles in English Grammar — Foundational Test</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400;1,600&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,600;1,8..60,300;1,8..60,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../style/mcq_style.css">
</head>
<body>

<script type="application/json" id="qdata">[]</script>

<script type="application/json" id="rddata">{}</script>

<div id="score-bar">
  <div class="sb-inner">
    <span class="sb-label">Live Score</span>
    <div class="pill p-score">Score <span class="pn" id="lv-s">0.00</span></div>
    <div class="pill p-ok">✓ <span class="pn" id="lv-ok">0</span></div>
    <div class="pill p-bad">✗ <span class="pn" id="lv-bad">0</span></div>
    <div class="pill p-skip">— <span class="pn" id="lv-sk">0</span></div>
  </div>
</div>

<div id="app">
  <div class="masthead">
    <div class="mast-rule top"></div>
    <h1>Articles in English Grammar</h1>
    <div class="mast-sub">Topper Examination</div>
    <div class="mast-meta">20 Questions · Topper Difficulty · +1 / −0.25 Marking</div>
    <div class="mast-rule bot"></div>
  </div>

  <div class="dots-wrap" id="dots-wrap"></div>
  <div id="quiz-wrap"></div>

  <div class="finish-wrap">
    <button class="btn-finish" onclick="finishTest()">Finish Test &amp; See Results</button>
  </div>

  <div id="results">
    <div class="res-card">
      <div class="res-hdr">
        <h2>Examination Complete</h2>
        <div class="orn">✶ ✶ ✶</div>
        <div class="grade" id="r-grade">—</div>
        <div class="grade-lbl" id="r-lbl"></div>
        <div class="stats">
          <div class="stat s-score">  <span class="stat-n" id="r-sc">0</span>  <span class="stat-l">Score</span></div>
          <div class="stat s-correct"><span class="stat-n" id="r-ok">0</span>  <span class="stat-l">Correct</span></div>
          <div class="stat s-wrong">  <span class="stat-n" id="r-bad">0</span> <span class="stat-l">Wrong</span></div>
          <div class="stat s-skip">   <span class="stat-n" id="r-skip">0</span><span class="stat-l">Skipped</span></div>
        </div>
      </div>
      <div class="res-body">
        <h3 class="sec-hdr">Subtopic Performance</h3>
        <div class="st-bars" id="st-bars"></div>
        <h3 class="sec-hdr">Personalised Study Roadmap</h3>
        <div class="roadmap" id="roadmap"></div>
        <div class="restart-wrap"><button class="btn-restart" onclick="location.reload()">Retake Examination</button></div>
      </div>
    </div>
  </div>
</div>
<script src="../../js/mcq_core.js"></script>
</body>
</html>
