<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Library</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ── Reset & Base ─────────────────────────────────────── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --card: #1f2235;
      --border: #2a2f45;
      --gold: #c9a84c;
      --gold-dim: #8a6a28;
      --text: #e8e4d9;
      --muted: #8a8fa8;
      --chip-bg: #252840;
      --chip-act: #c9a84c;
      --chip-act-text: #0f1117;
      --radius: 10px;
      --shadow: 0 4px 24px rgba(0, 0, 0, .45);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 32px 28px 60px;
    }

    /* ── Header ───────────────────────────────────────────── */
    .header-flex {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
    }

    .page-header h1 {
      font-size: 1.65rem;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: -.5px;
    }

    .page-header p {
      font-size: .85rem;
      color: var(--muted);
      margin-top: 4px;
    }

    .nav-btn {
      background: transparent;
      color: var(--gold);
      border: 1px solid var(--gold);
      padding: 8px 16px;
      border-radius: var(--radius);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 600;
      transition: all 0.2s;
    }

    .nav-btn:hover {
      background: var(--gold);
      color: var(--bg);
    }

    /* ── Search ───────────────────────────────────────────── */
    .search-wrap {
      position: relative;
      max-width: 480px;
      margin-bottom: 20px;
    }

    .search-wrap input {
      width: 100%;
      padding: 10px 16px 10px 40px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: inherit;
      font-size: .9rem;
      outline: none;
      transition: border-color .2s;
    }

    .search-wrap input:focus {
      border-color: var(--gold-dim);
    }

    .search-wrap input::placeholder {
      color: var(--muted);
    }

    .search-icon {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: .9rem;
      pointer-events: none;
    }

    /* ── Filter Row ───────────────────────────────────────── */
    .filter-section {
      margin-bottom: 28px;
    }

    .filter-label {
      font-size: .7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      padding: 5px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--chip-bg);
      color: var(--muted);
      font-size: .8rem;
      font-weight: 500;
      cursor: pointer;
      transition: all .18s;
      user-select: none;
    }

    .chip:hover {
      border-color: var(--gold-dim);
      color: var(--text);
    }

    .chip.active {
      background: var(--chip-act);
      border-color: var(--chip-act);
      color: var(--chip-act-text);
      font-weight: 600;
    }

    /* ── Stats bar ────────────────────────────────────────── */
    .stats-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    .stats-bar .count {
      font-size: .82rem;
      color: var(--muted);
    }

    .stats-bar .count strong {
      color: var(--text);
    }

    /* ── Grid ─────────────────────────────────────────────── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: 18px;
    }

    /* ── Card ─────────────────────────────────────────────── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      box-shadow: var(--shadow);
      transition: border-color .2s, transform .18s;
    }

    .card:hover {
      border-color: var(--gold-dim);
      transform: translateY(-2px);
    }

    .card-badges {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .badge {
      font-size: .7rem;
      font-weight: 600;
      padding: 2px 9px;
      border-radius: 12px;
      text-transform: uppercase;
      letter-spacing: .4px;
    }

    .badge-subject {
      background: #1e3a5f;
      color: #7ab3e0;
    }

    .badge-class {
      background: #2a1f40;
      color: #b08de8;
    }

    .badge-weekly {
      background: #1a3028;
      color: #6ec99a;
    }

    .badge-mcq {
      background: #3a2010;
      color: #e8a86e;
    }

    .badge-guide {
      background: #1a2a3a;
      color: #6eb5e8;
    }

    .card-title {
      font-size: .95rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.35;
    }

    .card-topics {
      font-size: .78rem;
      color: var(--muted);
      line-height: 1.4;
    }

    .card-topics span {
      display: inline-block;
      background: #252840;
      border-radius: 4px;
      padding: 1px 6px;
      margin: 1px 2px 1px 0;
      font-size: .73rem;
    }

    .card-meta {
      display: flex;
      gap: 14px;
      font-size: .75rem;
      color: var(--muted);
      flex-wrap: wrap;
    }

    .card-meta .meta-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .card-footer {
      margin-top: 4px;
      display: flex;
      justify-content: flex-end;
    }

    .btn-open {
      padding: 7px 18px;
      background: linear-gradient(135deg, var(--gold), var(--gold-dim));
      color: #0f1117;
      font-family: inherit;
      font-size: .8rem;
      font-weight: 700;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      text-decoration: none;
      transition: opacity .18s;
    }

    .btn-open:hover {
      opacity: .85;
    }

    /* ── Empty state ──────────────────────────────────────── */
    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    .empty .emoji {
      font-size: 2.5rem;
      margin-bottom: 12px;
    }

    .empty p {
      font-size: .9rem;
    }
  </style>
</head>

    // ══════════════════════════════════════════════════════════════
    // FILTER STATE
    // ══════════════════════════════════════════════════════════════
    const state = { subject: "All", class: "All", type: "All", search: "" };

    function unique(key) {
      return ["All", ...new Set(TESTS.map(t => t[key]).sort())];
    }

    function badgeClass(subject) {
      const map = {
        "Maths": "badge-subject",
        "English": "badge-subject",
        "Science": "badge-subject",
      };
      return map[subject] || "badge-subject";
    }

    function typeBadgeClass(type) {
      const map = {
        "Weekly Test": "badge-weekly",
        "MCQ": "badge-mcq",
        "Study Guide": "badge-guide",
        "Mock Test": "badge-weekly",
      };
      return map[type] || "badge-weekly";
    }

    // ── Build chip groups ──────────────────────────────────────
    function buildChips(containerId, values, stateKey) {
      const wrap = document.getElementById(containerId);
      wrap.innerHTML = "";
      values.forEach(v => {
        const c = document.createElement("div");
        c.className = "chip" + (state[stateKey] === v ? " active" : "");
        c.textContent = v;
        c.addEventListener("click", () => {
          state[stateKey] = v;
          buildChips(containerId, values, stateKey);
          render();
        });
        wrap.appendChild(c);
      });
    }

    // ── Copy Link Utility ──────────────────────────────────────
    function copyLink(id, el) {
      // Create a URL pointing to this dashboard with the '?id=' query parameter attached
      const url = new URL(window.location.pathname + "?id=" + id, window.location.origin);
      navigator.clipboard.writeText(url.href).then(() => {
        const originalText = el.innerHTML;
        el.innerHTML = "Copied!";
        setTimeout(() => el.innerHTML = originalText, 1500);
      });
    }

    // ── Render cards ──────────────────────────────────────────
    function render() {
      const q = state.search.toLowerCase();
      const filtered = TESTS.filter(t => {
        if (state.subject !== "All" && t.subject !== state.subject) return false;
        if (state.class !== "All" && t.class !== state.class) return false;
        if (state.type !== "All" && t.type !== state.type) return false;
        if (q && !t.title.toLowerCase().includes(q) &&
          !(t.id && t.id.toLowerCase().includes(q)) &&
          !t.topics.join(" ").toLowerCase().includes(q) &&
          !t.subject.toLowerCase().includes(q) &&
          !t.class.toLowerCase().includes(q)) return false;
        return true;
      });

      filtered.sort((a, b) => {
        const timeA = a.date ? new Date(a.date).getTime() : 0;
        const timeB = b.date ? new Date(b.date).getTime() : 0;
        return timeB - timeA;
      });

      document.getElementById("count-display").textContent = filtered.length;

      const grid = document.getElementById("card-grid");
      grid.innerHTML = "";

      if (filtered.length === 0) {
        grid.innerHTML = `
      <div class="empty">
        <div class="emoji">🔍</div>
        <p>No tests match your filters. Try adjusting the selection above.</p>
      </div>`;
        return;
      }

      filtered.forEach(t => {
        const topicTags = t.topics.map(tp => `<span>${tp}</span>`).join("");
        const metaItems = [
          t.model ? `<span class="meta-item">🤖 ${t.model}</span>` : "",
          t.marks ? `<span class="meta-item">📝 ${t.marks} marks</span>` : "",
          t.date ? `<span class="meta-item">📅 ${t.date}</span>` : "",
        ].filter(Boolean).join("");

        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
      <div class="card-badges">
        ${t.id ? `<span class="badge" onclick="copyLink('${t.id}', this)" title="Click to copy direct link" style="background:var(--accent);color:#fff;cursor:pointer">#${t.id} <span style="font-size:0.75rem;margin-left:2px">🔗</span></span>` : ""}
        <span class="badge ${badgeClass(t.subject)}">${t.subject}</span>
        <span class="badge badge-class">${t.class}</span>
        <span class="badge ${typeBadgeClass(t.type)}">${t.type}</span>
      </div>
      <div class="card-title">${t.title}</div>
      <div class="card-topics">${topicTags}</div>
      ${metaItems ? `<div class="card-meta">${metaItems}</div>` : ""}
      <div class="card-footer">
        <a class="btn-open" href="${t.url}" target="content-frame">Open →</a>
      </div>`;
        grid.appendChild(card);
      });
    }

    // ── Init ──────────────────────────────────────────────────

    // Automatically route to test if ?id= parameter exists in the URL
    const urlParams = new URLSearchParams(window.location.search);
    const targetId = urlParams.get("id");
    if (targetId) {
      const targetTest = TESTS.find(t => t.id === targetId);
      if (targetTest) {
        window.location.replace(targetTest.url);
      } else {
        alert("No test found with ID: " + targetId);
      }
    }

    buildChips("subject-chips", unique("subject"), "subject");
    buildChips("class-chips", unique("class"), "class");
    buildChips("type-chips", unique("type"), "type");

    document.getElementById("search-input").addEventListener("input", e => {
      state.search = e.target.value;
      render();
    });

    render();
  </script>
</body>

</html>
