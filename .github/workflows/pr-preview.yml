name: Deploy PR Preview
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]

jobs:
  deploy:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy Main to Root
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: . 
          branch: gh-pages
          target-folder: .
          clean: false

      - name: Deploy PR Preview
        if: github.event_name == 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: . 
          branch: gh-pages
          target-folder: previews/pr-${{ github.event.number }}
          clean: false

  cleanup:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages # Specifically check out the deployment branch

      - name: Delete PR folder
        run: |
          # Define the target path
          PR_FOLDER="previews/pr-${{ github.event.number }}"
          
          if [ -d "$PR_FOLDER" ]; then
            echo "Deleting $PR_FOLDER..."
            rm -rf "$PR_FOLDER"
            
            # Configure Git
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            
            # Commit and Push the deletion
            git add .
            git commit -m "chore: remove preview folder for PR ${{ github.event.number }}"
            git push origin gh-pages
          else
            echo "Folder $PR_FOLDER does not exist. Nothing to delete."
          fi