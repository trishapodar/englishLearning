      "Understand 'even' as an adverb of emphasis: 'Even she could not solve it' (stresses subject — surprising that even she failed), vs 'She could not even solve it' (stresses verb — did not manage to)."

    "traps": [
      "Mid-position 'only' before the verb when the intended focus is the object: 'I only eat apples' (ambiguous) should be 'I eat only apples' if the focus is on apples.",

      "'Maybe' and 'perhaps' typically appear in FRONT position (beginning of sentence): 'Maybe she will come'; other probability adverbs prefer mid-position."

    "traps": [
