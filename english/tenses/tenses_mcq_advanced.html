      "Future Perfect ('will have worked') is offered as a near-correct distractor that misses the duration emphasis signalled by 'for two years'.",
      "Future Continuous ('will be working') appears in options to tempt those who see '-ing' in the context but do not account for the 'by + future point' completion marker."
    ]
  },
  "Unreal Past — Wish / If Only": {
    "w": "7-9%",
    "tips": [
      "Present wish: wish + Past Simple. Past wish: wish + Past Perfect. Future/behaviour wish: wish + would.",
      "Stative verbs after 'wish' still take Past Simple, never progressive — 'I wish I knew' is correct; 'I wish I had been knowing' is always wrong.",
      "'If only' follows exactly the same rules as 'wish' — they are grammatically interchangeable."
    ],
    "traps": [
      "'I wish I would know' is a tempting trap — 'would' after 'wish' is valid only for other people's behaviour, not for one's own present states.",
      "Double trap: 'I wish I had been knowing' combines correct tense (Past Perfect) for a past wish with an incorrect progressive form of a stative verb."
    ]
  },
  "Type 3 Conditional": {
    "w": "9-11%",
    "tips": [
      "Type 3 formula: if + had + past participle, main = would/could/might + have + past participle.",
      "'Would have' in the if-clause is categorically wrong — this is the most tested rule in conditional sentences.",
      "For mixed conditionals, verify different time references between if-clause and main clause before accepting the sentence."
    ],
    "traps": [
      "Option with 'would have studied' in the if-clause is the primary trap — it appears grammatically parallel to the main clause and sounds fluent.",
      "Type 2 pattern ('would pass / studied') is offered as a near-miss, exploiting candidates who mix up unreal present and unreal past conditionals."
    ]
  },
  "Present Simple vs Present Continuous — Dynamic Meaning Shift": {
    "w": "6-8%",
    "tips": [
      "Dual-function verb list: taste, smell, feel, look, appear, have, see, think — stative in one sense, dynamic in another.",
      "Test: if the action is deliberate and volitional, it is dynamic and may take progressive. If it is a passive state, it is stative.",
      "'She is tasting' (deliberate sampling) vs. 'It tastes good' (passive perception) — the difference is agency."
    ],
    "traps": [
      "Examiners label 'is tasting' as incorrect, banking on students' rote knowledge that 'taste' is stative, without testing for the dynamic sense.",
      "Sentences like 'He is having a great time' (dynamic 'have') vs. 'He has a car' (stative 'have') test whether candidates distinguish the two functions of the same verb."
    ]
  },
  "Backshift Exceptions in Reported Speech": {
    "w": "6-7%",
    "tips": [
      "Universal truths, scientific laws, and permanent facts may retain the present tense in reported speech even when the reporting verb is past.",
      "Both backshifted and retained forms are technically acceptable for universal truths — but retaining is the safest and most formal choice.",
      "Identify the exception by asking: 'Is this still true at the moment of reporting?' If yes, Present Simple may be retained."
    ],
    "traps": [
      "Examiners present only the non-backshifted form as the correct answer, penalising students who rigidly apply backshift to universal truths.",
      "The 'both are correct' option is offered and is the right answer — candidates who distrust multi-answer options eliminate it incorrectly."
    ]
  }
}
