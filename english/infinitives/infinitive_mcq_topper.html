      "Distinguish the infinitive of unexpected result ('only to find', 'only to be told') from the infinitive of purpose ('to discover', 'to improve'). The 'only to' construction implies irony or disappointment and can only follow an active, animate agent performing the main action.",
      "For examination passages, look for sentences where a character acts with one intention and the infinitive clause names a surprising or negative outcome: 'She studied all night, only to fall asleep during the examination.' Identify this pattern and explain why the infinitive — not a gerund or participle — is used here."
    ],
    "traps": [
      "Examiners place 'being honest' (participial absolute) alongside 'to be honest' (infinitive comment clause) and ask which avoids the dangling modifier problem. 'To be honest' is idiomatic and immune to the dangling modifier rule; 'being honest' implies the sentence subject is honest, which may not be the writer's intent.",
      "The 'only to' construction is sometimes offered as a consequence in a context that requires an active animate agent, but the sentence supplies an inanimate or institutional subject ('The policy was revised, only to be challenged again'). In passive contexts, 'only to be' is valid; candidates must verify whether the passive infinitive 'only to be + past participle' fits before selecting."
    ]
  }
}
