      "Sentences with TWO article errors where only one option corrects both—students spot the more obvious error and choose an option that fixes it while missing the subtler second error.",
      "Sentences where the 'correct' sounding option has an article that is technically permissible in one reading but grammatically wrong in the intended generic reading—testing depth of understanding vs surface familiarity."
    ]
  },
  "Articles – Parallel Structures and Ellipsis": {
    "w": "4-6%",

      "Ellipsis of the article is only acceptable when the reference is to the same individual or item. If there is any ambiguity, the full form with repeated articles must be used."

      "Practise distinguishing 'a man who was walking' (non-restrictive; any man; indefinite) from 'the man who called yesterday' (restrictive; uniquely identifies; definite).",
