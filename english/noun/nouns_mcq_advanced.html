      "Memorise: passers-by, mothers-in-law, attorneys-general, commanders-in-chief, courts-martial, notaries public."
    ],
    "traps": [
      "Adding -s to the last word ('passer-bys') — for hyphenated compounds, find the head noun first.",
      "Treating 'public' in 'notary public' as the head because it comes last — 'notary' is the head (the person)."
    ]
  },
  "Noun Functions": {
    "w": "10-12%",
    "tips": [
      "Ditransitive pattern (grant, give, award, send): S + V + IO + DO. 'The court granted [IO: the petitioner] [DO: leave].'",
      "Adjectival object complement vs. noun object complement: both follow the DO and complete its meaning after verbs like declare, find, consider, render.",
      "Object complement test: does the element rename/describe the DO and share its referent? If YES → OC."
    ],
    "traps": [
      "In ditransitive sentences, identifying the first post-verb noun as the DO — it is the IO. Ask 'V + what?' for DO, 'V + to whom?' for IO.",
      "Confusing predicate adjective (after linking verb, describes subject) with adjectival object complement (after action verb, describes object)."
    ]
  },
  "Number Agreement": {
    "w": "8-10%",
    "tips": [
      "INTERNAL CONSISTENCY rule: verb and pronoun must match for collective nouns. Singular verb → 'its'; plural verb → 'their'. Never mix.",
      "British English allows both singular and plural verbs with collective nouns depending on unit vs. individual-action interpretation.",
      "Sentences with pronoun + verb mismatch (has...their, are...its) are always wrong regardless of which verb form was chosen."
    ],
    "traps": [
      "Checking only the verb-noun agreement and overlooking the verb-pronoun consistency — the trap is almost always in the pronoun, not the verb.",
      "Applying American English rules (collective nouns always singular) to questions, which follow British English."
    ]
  },
  "Countable and Uncountable Nouns": {
    "w": "14-16%",
    "tips": [
      "Dual-class nouns: 'work' (effort = uncountable; artistic composition = countable), 'evidence' (uncountable in legal use), 'information' (always uncountable).",
      "Partitive constructions for uncountable nouns: pieces of information/evidence/advice, items of news/equipment.",
      "Critical uncountable nouns in formal/legal English: information, advice, evidence, furniture, luggage, equipment, research, progress."
    ],
    "traps": [
      "'Informations', 'evidences', 'furnitures', 'advices' are always wrong in formal English — these nouns have no direct plural form.",
      "Using 'a/an' before a material noun in its substance sense signals a word-class shift error ('a marble' = the toy; 'marble' = the stone)."
    ]
  },
  "Noun Phrases": {
    "w": "8-10%",
    "tips": [
      "The finite-verb test is definitive: no finite verb inside the group → phrase; finite verb present → clause. Length is irrelevant.",
      "Long noun phrases with internal prepositional modifiers are still phrases, not clauses.",
      "Head noun of a NP: the noun that a pronoun can replace for the whole phrase."
    ],
    "traps": [
      "Classifying long, complex noun phrases as clauses because of their length or internal complexity.",
      "A NP containing a prepositional phrase is still a NP — the prepositional phrase is just a post-modifier."
    ]
  },
  "Proper Nouns": {
    "w": "5-7%",
    "tips": [
      "Antonomasia: proper noun + article → common noun function ('the Einstein of jurisprudence' = a genius).",
      "Two directions of antonomasia: proper→common ('the Shakespeare of Hindi') and common→proper ('the Iron Lady').",
      "The article before a proper noun is the grammatical signal that antonomasia has occurred."
    ],
    "traps": [
      "Confusing antonomasia (proper name used for a category) with metonymy (associated concept used for a thing).",
      "Missing that the presence of 'a/the' before a proper name signals a class shift from proper to common noun."
    ]
  },
  "Case of Nouns": {
    "w": "8-10%",
    "tips": [
      "Predicate nominative rule: after linking verbs (is, was, were, am, are), use nominative case — 'It is I/we/they' (formal written English).",
      "Pronouns after prepositions always take objective case: for us, between them, with whom.",
      "In examination contexts, always apply the formal prescriptive standard, not colloquial usage ('It's me' is wrong in formal grammar)."
    ],
    "traps": [
      "Applying objective case after linking verbs ('It is us/me') because the pronoun follows the verb — the predicate nominative is a SUBJECT position.",
      "Confusing the absolute construction rule with the predicate nominative rule."
    ]
  },
  "Gender of Nouns": {
    "w": "4-6%",
    "tips": [
      "English has NO grammatical gender agreement for articles or adjectives (unlike French/German).",
      "English gender taxonomy (masculine/feminine/neuter/common) is CLASSIFICATORY only, not a productive agreement system.",
      "Modern English gender is relevant primarily to PRONOUN selection (he/she/it/they), not to noun morphology."
    ],
    "traps": [
      "Importing gender-agreement rules from other languages and applying them to English articles or adjectives.",
      "Stating that 'English has three genders' as if it were equivalent to the productive gender systems of inflected languages."
    ]
  },
  "Appositive Nouns": {
    "w": "6-8%",
    "tips": [
      "Two tests for non-restrictive appositive: (1) COMMA TEST — set off by commas? (2) REMOVAL TEST — core identification preserved without it?",
      "Appositive vs. predicate nominative: appositive has NO linking verb between the two nouns; predicate nominative ALWAYS follows a linking verb.",
      "Non-restrictive appositives add supplementary, parenthetical information about an already-identified noun."
    ],
    "traps": [
      "Arguing that removing a non-restrictive appositive 'changes meaning' and therefore it must be restrictive — the test is CORE IDENTIFICATION, not full meaning.",
      "Classifying appositives as predicate nominatives because both rename nouns — the linking verb is the diagnostic."
    ]
  },
  "Plural Formation": {
    "w": "8-10%",
    "tips": [
      "Formal academic standard: datum/data, criterion/criteria, phenomenon/phenomena. Always use Latin/Greek plurals in examination contexts.",
      "'Data are' (plural) is the formal standard; 'data is' is accepted informally but wrong in competitive examination answers.",
      "For Latin/Greek nouns: never add -s to an already-plural form ('datas', 'criterias', 'phenomenas' are always errors)."
    ],
    "traps": [
      "Writing 'data is' in formal grammar answers — 'data are' is required in formal contexts.",
      "Using 'datums' as a general-purpose plural — it exists only in a narrow technical surveying context."
    ]
  },
  "Material Nouns": {
    "w": "4-6%",
    "tips": [
      "Material nouns in substance sense are UNCOUNTABLE — no 'a/an', no plural -s. Generic: 'Gold is precious', 'Marble is durable'.",
      "To count: use partitive constructions — 'a piece of marble', 'a block of iron', 'a sheet of glass'.",
      "Adding 'a/an' to a material noun signals a word-class shift to countable common noun ('a marble' = the toy, not the stone)."
    ],
    "traps": [
      "Using 'a' before a material noun in its substance sense ('a marble imported from Carrara') — this is always wrong.",
      "Assuming all concrete nouns are material nouns — 'chair' is concrete but not a material noun; 'wood' is the material noun."
    ]
  },
  "Types of Nouns": {
    "w": "6-8%",
    "tips": [
      "Zero conversion (functional shift): a word changes class with NO morphological change — 'a must', 'a run', 'the rich' as nouns.",
      "Distinguish: DERIVATION uses affixes (act→action); ZERO CONVERSION uses identical form (run as verb vs. run as noun).",
      "Context is the sole indicator of grammatical class in zero conversion — the word form is identical."
    ],
    "traps": [
      "Confusing zero conversion with derivation because both produce new grammatical categories — derivation changes the form; zero conversion does not.",
      "Confusing zero conversion with compounding or blending — those processes always produce a new form."
    ]
  }
}
</script>

<div id="score-bar">
  <div class="sb-inner">
    <span class="sb-label">Live Score</span>
    <div class="pill p-score">Score <span class="pn" id="lv-s">0.00</span></div>
    <div class="pill p-ok">✓ <span class="pn" id="lv-ok">0</span></div>
    <div class="pill p-bad">✗ <span class="pn" id="lv-bad">0</span></div>
    <div class="pill p-skip">— <span class="pn" id="lv-sk">0</span></div>
  </div>
</div>

<div id="app">
  <div class="masthead">
    <div class="mast-rule top"></div>
    <h1>Nouns in English Grammar</h1>
    <div class="mast-sub">Advanced Examination</div>
    <div class="mast-meta">20 Questions · Advanced Difficulty · +1 / −0.25 Marking</div>
    <div class="mast-rule bot"></div>
  </div>

  <div class="dots-wrap" id="dots-wrap"></div>
  <div id="quiz-wrap"></div>

  <div class="finish-wrap">
    <button class="btn-finish" onclick="finishTest()">Finish Test &amp; See Results</button>
  </div>

  <div id="results">
    <div class="res-card">
      <div class="res-hdr">
        <h2>Examination Complete</h2>
        <div class="orn">✶ ✶ ✶</div>
        <div class="grade" id="r-grade">—</div>
        <div class="grade-lbl" id="r-lbl"></div>
        <div class="stats">
          <div class="stat s-score">  <span class="stat-n" id="r-sc">0</span>  <span class="stat-l">Score</span></div>
          <div class="stat s-correct"><span class="stat-n" id="r-ok">0</span>  <span class="stat-l">Correct</span></div>
          <div class="stat s-wrong">  <span class="stat-n" id="r-bad">0</span> <span class="stat-l">Wrong</span></div>
          <div class="stat s-skip">   <span class="stat-n" id="r-skip">0</span><span class="stat-l">Skipped</span></div>
        </div>
      </div>
      <div class="res-body">
        <h3 class="sec-hdr">Subtopic Performance</h3>
        <div class="st-bars" id="st-bars"></div>
        <h3 class="sec-hdr">Personalised Study Roadmap</h3>
        <div class="roadmap" id="roadmap"></div>
        <div class="restart-wrap"><button class="btn-restart" onclick="location.reload()">Retake Examination</button></div>
      </div>
    </div>
  </div>
</div>

<script>
/* === STEP D: Load data from JSON data islands === */
var QUESTIONS = JSON.parse(document.getElementById('qdata').textContent);
var RD = JSON.parse(document.getElementById('rddata').textContent);

/* === STATE === */
var S = {
  chosen: new Array(QUESTIONS.length).fill(null),
  checked: new Array(QUESTIONS.length).fill(false),
  skipped: new Array(QUESTIONS.length).fill(false),
  score: 0, ok: 0, bad: 0, skip: 0
};

/* === BOOT === */
window.addEventListener('DOMContentLoaded', function() {
  buildDots();
  buildCards();
});

/* === DOTS === */
function buildDots() {
  var h = '', i;
  for (i = 0; i < QUESTIONS.length; i++) {
    h += '<button class="dot" id="dot-' + i + '" data-qi="' + i + '">' + (i + 1) + '</button>';
  }
  var wrap = document.getElementById('dots-wrap');
  wrap.innerHTML = h;
  wrap.addEventListener('click', function(e) {
    var b = e.target.closest('.dot');
    if (b) {
      var el = document.getElementById('card-' + b.getAttribute('data-qi'));
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  });
}

function updateDot(qi) {
  var d = document.getElementById('dot-' + qi);
  d.className = 'dot';
  if (S.skipped[qi]) { d.classList.add('d-skip'); return; }
  if (!S.checked[qi]) return;
  d.classList.add(S.chosen[qi] === QUESTIONS[qi].correct ? 'd-ok' : 'd-bad');
}

/* === CARDS (STEP E: data-* attrs, event delegation, NO inline onclick) === */
function buildCards() {
  var h = '', i;
  for (i = 0; i < QUESTIONS.length; i++) h += cardHTML(QUESTIONS[i], i);
  var wrap = document.getElementById('quiz-wrap');
  wrap.innerHTML = h;

  /* Option click delegation */
  wrap.addEventListener('click', function(e) {
    var b = e.target.closest('.opt');
    if (b && !b.classList.contains('locked')) {
      pick(parseInt(b.getAttribute('data-qi')), b.getAttribute('data-lbl'));
    }
  });

  /* Check/Skip click delegation */
  wrap.addEventListener('click', function(e) {
    var b;
    b = e.target.closest('.btn-check');
    if (b && !b.disabled) { checkQ(parseInt(b.getAttribute('data-qi'))); return; }
    b = e.target.closest('.btn-skip');
    if (b) { skipQ(parseInt(b.getAttribute('data-qi'))); }
  });
}

function cardHTML(q, i) {
  var oh = '', j;
  for (j = 0; j < q.options.length; j++) {
    var o = q.options[j];
    oh += '<button class="opt" id="opt-' + i + '-' + o.label + '"'
        + ' data-qi="' + i + '" data-lbl="' + o.label + '">'
        + '<span class="opt-lt">' + o.label + '</span>'
        + '<span>' + xe(o.text) + '</span>'
        + '</button>';
  }
  return '<div class="card" id="card-' + i + '">'
    + '<div class="q-hdr">'
    + '<div class="q-num">' + (i + 1) + '</div>'
    + '<div class="q-tags">'
    + '<div class="q-sub">' + xe(q.subtopic) + '</div>'
    + '<div class="q-diff">' + q.difficulty + '</div>'
    + '</div></div>'
    + '<div class="q-stem">' + q.stem + '</div>'
    + '<div class="options">' + oh + '</div>'
    + '<div class="action-row">'
    + '<button class="btn btn-check" id="chk-' + i + '" data-qi="' + i + '" disabled>Check Answer</button>'
    + '<button class="btn btn-skip" id="skp-' + i + '" data-qi="' + i + '">Skip</button>'
    + '</div>'
    + '<div id="exp-' + i + '"></div>'
    + '</div>';
}

/* === PICK === */
function pick(qi, lbl) {
  if (S.checked[qi] || S.skipped[qi]) return;
  S.chosen[qi] = lbl;
  var opts = QUESTIONS[qi].options, j;
  for (j = 0; j < opts.length; j++) {
    var b = document.getElementById('opt-' + qi + '-' + opts[j].label);
    if (opts[j].label === lbl) b.classList.add('sel');
    else b.classList.remove('sel');
  }
  document.getElementById('chk-' + qi).disabled = false;
}

/* === CHECK === */
function checkQ(qi) {
  if (S.checked[qi]) return;
  S.checked[qi] = true;
  var q = QUESTIONS[qi], ch = S.chosen[qi], ok = (ch === q.correct), j;
  if (ok) { S.score += 1; S.ok++; } else { S.score -= 0.25; S.bad++; }
  for (j = 0; j < q.options.length; j++) {
    var b = document.getElementById('opt-' + qi + '-' + q.options[j].label);
    b.classList.add('locked'); b.classList.remove('sel');
    if (q.options[j].label === q.correct) b.classList.add('c-ok');
    else if (q.options[j].label === ch && !ok) b.classList.add('c-bad');
    else b.classList.add('c-dim');
  }
  document.getElementById('chk-' + qi).style.display = 'none';
  document.getElementById('skp-' + qi).style.display = 'none';
  renderExp(qi, ch, ok, q);
  bar(); updateDot(qi);
}

/* === SKIP === */
function skipQ(qi) {
  if (S.checked[qi] || S.skipped[qi]) return;
  S.skipped[qi] = true; S.skip++;
  var opts = QUESTIONS[qi].options, j;
  for (j = 0; j < opts.length; j++)
    document.getElementById('opt-' + qi + '-' + opts[j].label).classList.add('locked', 'c-dim');
  document.getElementById('chk-' + qi).style.display = 'none';
  document.getElementById('skp-' + qi).style.display = 'none';
  bar(); updateDot(qi);
  document.getElementById('exp-' + qi).innerHTML =
    '<div class="exp-wrap"><div class="exp-hdr">'
    + '<span class="exp-verdict">— Skipped · No mark awarded</span>'
    + '<span class="exp-delta d-zero">0</span></div>'
    + '<div class="exp-body" style="padding:12px 18px;">'
    + '<p style="font-size:.88rem;color:var(--ink-muted);font-style:italic;">'
    + 'Correct answer: <strong style="color:var(--gold)">' + xe(QUESTIONS[qi].correct) + '</strong></p>'
    + '</div></div>';
}

/* === EXPLANATION === */
function renderExp(qi, ch, ok, q) {
  var verdict = ok ? '✓ Correct — +1 mark' : '✗ Incorrect — Correct answer: ' + q.correct;
  var dt = ok ? '+1' : '−0.25', dc = ok ? 'd-pos' : 'd-neg';
  var oh = '', j;
  for (j = 0; j < q.options.length; j++) {
    var o = q.options[j];
    var isCor = (o.label === q.correct), isWrg = (o.label === ch && !isCor);
    var cls = isCor ? 'oe oe-ok' : (isWrg ? 'oe oe-bad' : 'oe');
    var ico = isCor ? '✓' : (isWrg ? '✗' : '·');
    oh += '<div class="' + cls + '">'
        + '<div class="oe-lbl"><span class="oe-ltr">' + ico + ' ' + o.label + '.</span> ' + xe(o.text) + '</div>'
        + '<div style="margin-top:3px">' + xe(o.explanation) + '</div>'
        + '</div>';
  }
  document.getElementById('exp-' + qi).innerHTML =
    '<div class="exp-wrap"><div class="exp-hdr">'
    + '<span class="exp-verdict">' + verdict + '</span>'
    + '<span class="exp-delta ' + dc + '">' + dt + '</span></div>'
    + '<div class="exp-body"><div class="opt-exps">' + oh + '</div>'
    + '<div class="insight-row">'
    + '<div class="insight i-top"><div class="ins-title">★ Topper\'s Rule</div>'
    + '<div class="ins-text">' + xe(q.topperRule) + '</div></div>'
    + '<div class="insight i-err"><div class="ins-title">⚠ Common Mistake</div>'
    + '<div class="ins-text">' + xe(q.commonMistake) + '</div></div>'
    + '</div></div></div>';
}

/* === SCORE BAR === */
function bar() {
  document.getElementById('lv-s').textContent = S.score.toFixed(2);
  document.getElementById('lv-ok').textContent = S.ok;
  document.getElementById('lv-bad').textContent = S.bad;
  document.getElementById('lv-sk').textContent = S.skip;
}

/* === FINISH TEST === */
function finishTest() {
  var i;
  for (i = 0; i < QUESTIONS.length; i++) if (!S.checked[i] && !S.skipped[i]) skipQ(i);
  document.getElementById('quiz-wrap').style.display = 'none';
  document.getElementById('dots-wrap').style.display = 'none';
  document.querySelector('.finish-wrap').style.display = 'none';
  var res = document.getElementById('results');
  res.style.display = 'block';
  res.scrollIntoView({ behavior: 'smooth', block: 'start' });
  var pct = (S.score / QUESTIONS.length) * 100;
  var grade, lbl;
  if (pct >= 90) { grade = 'A+'; lbl = 'Outstanding — Examiner Standard'; }
  else if (pct >= 75) { grade = 'A';  lbl = 'Excellent — Well Prepared'; }
  else if (pct >= 60) { grade = 'B';  lbl = 'Good — Minor Gaps to Address'; }
  else if (pct >= 40) { grade = 'C';  lbl = 'Average — Focused Revision Required'; }
  else if (pct >= 20) { grade = 'D';  lbl = 'Below Average — Revise Fundamentals'; }
  else { grade = 'F'; lbl = 'Needs Comprehensive Revision'; }
  document.getElementById('r-grade').textContent = grade;
  document.getElementById('r-lbl').textContent = lbl;
  document.getElementById('r-sc').textContent = S.score.toFixed(2);
  document.getElementById('r-ok').textContent = S.ok;
  document.getElementById('r-bad').textContent = S.bad;
  document.getElementById('r-skip').textContent = S.skip;
  buildBars(); buildRoadmap();
}

/* === SUBTOPIC BARS === */
function buildBars() {
  var map = {}, i;
  for (i = 0; i < QUESTIONS.length; i++) {
    var st = QUESTIONS[i].subtopic;
    if (!map[st]) map[st] = { total: 0, correct: 0 };
    map[st].total++;
    if (S.checked[i] && S.chosen[i] === QUESTIONS[i].correct) map[st].correct++;
  }
  window._stMap = map;
  var keys = Object.keys(map), h = '', k;
  for (k = 0; k < keys.length; k++) {
    var nm = keys[k], d = map[nm];
    var p = d.total ? Math.round((d.correct / d.total) * 100) : 0;
    var fc = p >= 70 ? 'f-hi' : p >= 40 ? 'f-mid' : 'f-lo';
    h += '<div>'
       + '<div class="st-top"><span class="st-nm">' + xe(nm) + '</span>'
       + '<span class="st-sc">' + d.correct + '/' + d.total + ' (' + p + '%)</span></div>'
       + '<div class="st-track"><div class="st-fill ' + fc + '" style="width:0%" data-t="' + p + '"></div></div>'
       + '</div>';
  }
  document.getElementById('st-bars').innerHTML = h;
  setTimeout(function() {
    var els = document.querySelectorAll('.st-fill[data-t]'), f;
    for (f = 0; f < els.length; f++) els[f].style.width = els[f].getAttribute('data-t') + '%';
  }, 120);
}

/* === ROADMAP === */
function buildRoadmap() {
  var map = window._stMap || {};
  var keys = Object.keys(map).sort(function(a, b) {
    var pa = map[a].total ? map[a].correct / map[a].total : 0;
    var pb = map[b].total ? map[b].correct / map[b].total : 0;
    return pa - pb;
  });
  var h = '', k;
  for (k = 0; k < keys.length; k++) {
    var nm = keys[k], d = map[nm];
    var p = d.total ? d.correct / d.total : 0;
    var pri = p < 0.5 ? 'High' : p < 0.75 ? 'Medium' : 'Low';
    var pc = pri === 'High' ? 'rp-hi' : pri === 'Medium' ? 'rp-mid' : 'rp-lo';
    var bc = pri === 'High' ? 'bh' : pri === 'Medium' ? 'bm' : 'bl';
    var rd = RD[nm] || { w: '—', tips: [], traps: [] };
    var tips = '', traps = '', t;
    for (t = 0; t < rd.tips.length; t++) tips += '<li>' + xe(rd.tips[t]) + '</li>';
    for (t = 0; t < rd.traps.length; t++) traps += '<li>' + xe(rd.traps[t]) + '</li>';
    h += '<div class="rm ' + pc + '">'
       + '<div class="rm-top">' + xe(nm) + '<span class="rm-badge ' + bc + '">' + pri + ' Priority</span></div>'
       + '<div class="rm-w">Exam Weight: ' + xe(rd.w) + '</div>'
       + '<div class="rm-grid">'
       + '<div><div class="rm-ct">Study Tips</div><ul class="rm-list">' + tips + '</ul></div>'
       + '<div><div class="rm-ct">Examiner Traps</div><ul class="rm-list">' + traps + '</ul></div>'
       + '</div></div>';
  }
  document.getElementById('roadmap').innerHTML = h;
}

/* === xe: HTML-encode for text nodes === */
function xe(s) {
  if (typeof s !== 'string') return '';
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;')
          .replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

</script>
