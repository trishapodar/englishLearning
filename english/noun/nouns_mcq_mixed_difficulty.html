var QUESTIONS = JSON.parse('[{"id":1,"subtopic":"Types of Nouns","difficulty":"Easy","stem":"In the sentence <em>\u201cThe committee\u2019s wisdom surprised everyone.\u201d</em> Which word is an <strong>abstract noun</strong>?","options":[{"label":"A","text":"committee","explanation":"The word committee is a collective noun \u2014 it names a group of individuals functioning as a single unit. Grammar classifies it as collective, not abstract, because it refers to real, nameable persons gathered together."},{"label":"B","text":"wisdom","explanation":"Wisdom is an abstract noun \u2014 it names an intangible quality of the mind that cannot be seen, touched, heard, smelled, or tasted. Abstract nouns denote qualities, states, or ideas such as courage, justice, and wisdom. This is the correct answer."},{"label":"C","text":"everyone","explanation":"Everyone is an indefinite pronoun, not a noun at all. Pronouns substitute for nouns but belong to a separate word class. Treating a pronoun as a noun is a foundational error that examiners deliberately set as a trap."},{"label":"D","text":"surprised","explanation":"Surprised is a verb in this sentence \u2014 specifically, the main verb of the clause. Verbs denote actions or states; they are not nouns. Selecting a verb as an abstract noun reflects confusion between word classes."}],"correct":"B","topperRule":"Test a noun by asking: Can I perceive this with my five senses? If NO, it is abstract (wisdom, freedom, grief). Abstract nouns typically carry suffixes like -ness, -ity, -dom, -ance, -tion, -ship, or -ment.","commonMistake":"Students routinely confuse collective nouns (jury, flock, committee) with abstract nouns. Collective nouns are CONCRETE \u2014 they name real groups of persons or things. Abstract nouns name INTANGIBLE concepts. The distinction lies in tangibility, not in whether the noun is visible as a single object."},{"id":2,"subtopic":"Collective Nouns","difficulty":"Medium","stem":"Which sentence uses an <strong>incorrect</strong> collective noun for the given group of animals?","options":[{"label":"A","text":"A pride of lions roamed the savannah.","explanation":"Pride is the universally accepted collective noun for a group of lions. It is a standard lexical item tested in competitive vocabulary sections and this sentence is entirely correct."},{"label":"B","text":"A gaggle of geese waddled across the road.","explanation":"Gaggle is the correct collective noun for geese when they are on the ground or water. Since this sentence places the geese on a road (not in flight), gaggle is precisely correct and the sentence contains no error."},{"label":"C","text":"A school of whales was spotted near the shore.","explanation":"This is INCORRECT. The collective noun for whales is a pod, not a school. A school or shoal is used for fish. Applying school to whales \u2014 marine mammals, not fish \u2014 is a common factual error that examiners exploit. This is the answer to choose."},{"label":"D","text":"A murder of crows perched on the telegraph wire.","explanation":"Murder is the well-established collective noun for crows. It appears in all standard dictionaries of collective nouns and is a frequent entry in vocabulary lists. This sentence is entirely correct."}],"correct":"C","topperRule":"Collective nouns for animals are non-interchangeable. Memorise the most tested sets: pod (whales/dolphins), school/shoal (fish), pride (lions), gaggle (geese on ground), murder (crows), parliament (owls), crash (rhinos), tower (giraffes), bloat (hippos).","commonMistake":"Students apply school broadly to all aquatic or marine creatures. Remember: school refers ONLY to fish. Whales and dolphins are marine mammals and their collective noun is pod. Conflating school of fish with school of whales is one of the most penalised collective-noun errors."},{"id":3,"subtopic":"Countable and Uncountable Nouns","difficulty":"Medium","stem":"Which sentence contains an <strong>error</strong> in the use of a countable or uncountable noun?","options":[{"label":"A","text":"She offered several pieces of advice.","explanation":"Advice is an uncountable noun and cannot be directly pluralised. The correct partitive construction is pieces of advice. The sentence properly avoids the non-standard form advices and uses the required partitive structure, making it grammatically correct."},{"label":"B","text":"The news are shocking.","explanation":"This is INCORRECT. News is an uncountable noun that always takes a singular verb, despite its misleading -s ending. The correct sentence is: The news is shocking. The -s in news is part of the root word, not a plural marker, so it is one of the most tested agreement traps."},{"label":"C","text":"He has little patience for mediocrity.","explanation":"Patience is an uncountable abstract noun. Little is the correct quantifier for uncountable nouns, in contrast with few which is used with countable nouns. This sentence is grammatically impeccable and idiomatically standard."},{"label":"D","text":"There is much work still to be done.","explanation":"Work is used here as an uncountable noun denoting tasks and effort in general. Much is the appropriate quantifier for uncountable nouns in formal written English. This sentence is correct in both grammar and register."}],"correct":"B","topperRule":"Several nouns ending in -s are uncountable and always take singular verbs: news, mathematics, physics, economics, athletics, means, series, species. These are false plurals \u2014 the -s is part of the word form, not a plural inflection. The news IS is always correct.","commonMistake":"The terminal -s in news creates a visual illusion of plurality. Students write The news are, which is universally wrong. Similarly, informations, furnitures, and luggages are all non-standard \u2014 these nouns have no plural forms."},{"id":4,"subtopic":"Plural Formation","difficulty":"Medium","stem":"Which of the following plural forms is <strong>correctly matched</strong> in ALL contexts?","options":[{"label":"A","text":"index \u2192 indexes (in mathematical contexts)","explanation":"In mathematical and scientific contexts the required plural of index is indices, not indexes. Indexes is acceptable only for back-of-book indexes and general non-technical usage. Claiming indexes is correct in mathematical contexts would be penalised in a formal examination."},{"label":"B","text":"mongoose \u2192 mongooses","explanation":"Mongooses is the correct, dictionary-accepted plural of mongoose. Despite sounding similar to goose (plural: geese), mongoose derives from Marathi/Konkani, sharing no etymological link with goose. The regular English plural -es applies. Mongeese is a widespread but non-standard folk form."},{"label":"C","text":"phenomenon \u2192 phenomenons","explanation":"The standard plural of phenomenon (Greek origin) is phenomena, following the Greek pattern -on to -a. Using phenomenons is considered a serious error in academic and examination writing. Only phenomena is accepted in answers."},{"label":"D","text":"datum \u2192 datas","explanation":"Datum (Latin singular) pluralises as data, not datas. Data itself is the plural form and datas does not exist in any standard variety of English. This error compounds by adding a regular English plural suffix to an already-plural Latin form."}],"correct":"B","topperRule":"Apply regular English -s/-es to nouns of non-European origin fully absorbed into English: mongooses, kimonos. Reserve Latin/Greek plurals for words used in academic/formal registers: criterion/criteria, datum/data, phenomenon/phenomena, radius/radii, nucleus/nuclei.","commonMistake":"Students pluralise mongoose as mongeese by false analogy with goose \u2192 geese. The similarity in sound is coincidental \u2014 the words are etymologically unrelated. When in doubt about a foreign-origin word, follow the standard -s/-es rule unless a well-established irregular plural is documented in the dictionary."},{"id":5,"subtopic":"Possessive Case","difficulty":"Medium","stem":"Which sentence uses the <strong>possessive case</strong> of an irregular plural noun correctly?","options":[{"label":"A","text":"The childrens\u2019 toys were scattered across the hall.","explanation":"Childrens\u2019 is incorrect in two ways: first, childrens is not a word because children is already the irregular plural of child; second, placing the apostrophe after a non-existent -s is wrong. This form reveals a fundamental misunderstanding of irregular plurals."},{"label":"B","text":"The children\u2019s toys were scattered across the hall.","explanation":"Children\u2019s is the correct possessive form. For irregular plurals that do NOT end in -s (children, men, women, geese, mice), the rule is to add apostrophe-s directly to the plural form: children becomes children\u2019s. This is the standard possessive accepted in all style guides."},{"label":"C","text":"The childrens\u2019s toys were scattered across the hall.","explanation":"Childrens\u2019s compounds two errors: it invents the non-word childrens and then adds another \u2019s. This form violates both the spelling of the irregular plural and the rules governing apostrophe placement for possessives."},{"label":"D","text":"The childrens toys were scattered across the hall.","explanation":"Omitting the apostrophe entirely removes the grammatical marker of possession. Without the apostrophe, childrens (itself a non-word) cannot signal any possessive relationship. The sentence is grammatically incoherent."}],"correct":"B","topperRule":"For IRREGULAR plurals not ending in -s (children, men, women, geese, mice, teeth, oxen), add apostrophe-s to form the possessive: children\u2019s, men\u2019s, women\u2019s. For REGULAR plurals ending in -s (boys, students, lawyers), add only an apostrophe after the -s: boys\u2019, students\u2019, lawyers\u2019.","commonMistake":"The most common error is fabricating childrens \u2014 treating children as if it needs an -s to become plural (it does not; children IS the plural). From this false base, students then misplace the apostrophe producing childrens\u2019 or childrens\u2019s, both of which are wrong."},{"id":6,"subtopic":"Noun Clauses","difficulty":"Hard","stem":"In the sentence <em>\u201cThat she refused the settlement shocked the entire legal fraternity.\u201d</em> The clause <em>That she refused the settlement</em> functions as:","options":[{"label":"A","text":"An adverbial clause modifying the verb shocked","explanation":"Adverbial clauses modify a verb by providing circumstance: time, reason, condition, manner, or concession. They answer when, why, how, or under what condition and are typically introduced by conjunctions like because, although, or when \u2014 not by the complementiser that. The clause here does not provide circumstance; it IS the subject of the sentence."},{"label":"B","text":"The subject of the main verb shocked","explanation":"That she refused the settlement is a noun clause functioning as the SUBJECT of the main verb shocked. The clause occupies the subject slot: [That she refused the settlement] shocked [the entire legal fraternity]. Proof: substitute a pronoun \u2014 It shocked the entire legal fraternity. The substitution works, confirming the clause is the subject. This is the correct answer."},{"label":"C","text":"An adjective clause modifying fraternity","explanation":"Adjective (relative) clauses modify nouns and are introduced by relative pronouns: who, whom, whose, which, that in its relative use. The clause here is introduced by that functioning as a complementiser \u2014 it introduces a noun clause, not a relative clause. Its position before the main verb confirms it is the subject."},{"label":"D","text":"An object complement of the verb shocked","explanation":"An object complement follows the direct object and renames or describes it. In this sentence the noun clause precedes the verb and acts as the subject \u2014 there is no direct object being complemented before the clause appears. Object complements follow transitive verbs after their objects, a structure entirely absent here."}],"correct":"B","topperRule":"To identify a noun clause\u2019s function, replace the entire clause with the pronoun it or this. If the sentence remains grammatical, the clause occupies a noun position. Noun clauses can be subjects, direct objects, indirect objects, or subject complements.","commonMistake":"Students see a subordinating word (that) and reflexively label the clause adverbial. The key distinction: adverbial clauses answer how/when/where/why and are optional; noun clauses fill a core grammatical slot (subject, object) and cannot be removed without destroying the sentence."},{"id":7,"subtopic":"Compound Nouns","difficulty":"Medium","stem":"Which is the <strong>correct plural</strong> of the compound noun <em>attorney-general</em>?","options":[{"label":"A","text":"attorney-generals","explanation":"Attorney-generals incorrectly pluralises the last element of the compound. In hyphenated compound nouns where the principal (head) noun is the first element, the plural suffix attaches to that head noun. General is an adjectival modifier here, not the head noun, and should not take the plural marker."},{"label":"B","text":"attorneys-general","explanation":"Attorneys-general is the correct plural. For hyphenated compound nouns, pluralise the HEAD noun \u2014 the word carrying the core meaning. In attorney-general, attorney is the head noun (it denotes the person); general is a post-positive adjective. Therefore: attorney becomes attorneys, giving attorneys-general. This is the form used in formal legal contexts."},{"label":"C","text":"attorneys-generals","explanation":"Attorneys-generals double-pluralises the compound, adding -s to both attorney and general. Only the head noun receives the plural inflection. Adding -s to both elements is non-standard and violates the rule governing hyphenated compound noun pluralisation."},{"label":"D","text":"attorney-generales","explanation":"Attorney-generales invents a pseudo-Latin plural suffix (-ales) that does not apply to this English compound noun. Attorney-general is an English legal title formed from English words; there is no Latin plural paradigm applicable here. This option is a deliberate distractor."}],"correct":"B","topperRule":"For hyphenated compound nouns, always pluralise the HEAD noun \u2014 the word carrying the primary meaning \u2014 regardless of its position. Examples: attorneys-general, mothers-in-law, courts-martial, passers-by, aides-de-camp, sons-in-law, commanders-in-chief. The modifier never takes the plural suffix.","commonMistake":"Students default to adding -s to the last word of any compound, producing attorney-generals, mother-in-laws, and court-martials \u2014 all incorrect in formal English. The head noun, not the final word, determines where the plural suffix goes."},{"id":8,"subtopic":"Gender of Nouns","difficulty":"Easy","stem":"The legal feminine form of the noun <em>executor</em> (a person appointed to carry out the terms of a will) is:","options":[{"label":"A","text":"Executress","explanation":"Executress applies the common English feminine suffix -ess (actress, poetess, hostess) to executor, but this form is not recognised in formal legal English or standard grammatical dictionaries. The correct legal feminine is a Latin-origin form, not a simple -ess derivation."},{"label":"B","text":"Executrix","explanation":"Executrix is the correct legal and grammatical feminine of executor. Derived from Latin, it follows the pattern where -tor (masculine) changes to -trix (feminine): testator/testatrix, administrator/administratrix, executor/executrix. Executrix appears in legal documents and formal grammar references as the prescribed feminine form."},{"label":"C","text":"Executrice","explanation":"Executrice does not exist in standard English grammar or legal usage. It superficially resembles a French feminine form (-rice is a French feminine suffix), but no such anglicisation has been adopted into English legal terminology. This option traps students who conflate French and English word-formation rules."},{"label":"D","text":"Executrices","explanation":"Executrices is the PLURAL of executrix (following the Latin -ix to -ices pattern), not the feminine singular. The question asks for the singular feminine form. This option tests whether students can distinguish number (singular vs. plural) from grammatical gender."}],"correct":"B","topperRule":"Latin-origin nouns often retain their Latin feminine suffixes in legal and formal English. Key pairs: executor/executrix, testator/testatrix, administrator/administratrix. For non-Latin nouns, the -ess suffix applies: poet/poetess, host/hostess, actor/actress.","commonMistake":"Students reflexively add -ess to form the feminine of any noun (executress), ignoring that Latinate legal nouns use the -trix suffix instead. The -ess suffix is productive for common nouns; the -trix suffix is reserved for Latinate professional and legal titles."},{"id":9,"subtopic":"Appositive Nouns","difficulty":"Hard","stem":"In the sentence <em>\u201cMy mentor, a former Chief Justice, presides over the moot court.\u201d</em> The phrase <em>a former Chief Justice</em> is grammatically described as:","options":[{"label":"A","text":"A predicate nominative renaming the subject","explanation":"A predicate nominative renames the subject but does so AFTER a linking verb (is, was, were, seems, becomes). In this sentence no linking verb appears between mentor and a former Chief Justice. The phrase is inserted directly beside the noun it renames, separated by commas \u2014 the structural signature of an appositive, not a predicate nominative."},{"label":"B","text":"A non-restrictive appositive noun phrase","explanation":"A former Chief Justice is a NON-RESTRICTIVE APPOSITIVE noun phrase \u2014 a noun phrase placed immediately beside another noun (my mentor) to rename or further identify it, with commas indicating the information is supplementary, not essential to identification. This is the precise grammatical classification: appositive (it renames) + non-restrictive (set off by commas, removable without changing core meaning)."},{"label":"C","text":"An adjective phrase modifying mentor","explanation":"Adjective phrases modify nouns by describing attributes. An appositive, however, RENAMES the noun using another noun phrase \u2014 it does not merely describe an attribute. A former Chief Justice gives an alternative identity for my mentor, making it a noun phrase in apposition, not an adjectival modifier."},{"label":"D","text":"A noun clause functioning as subject complement","explanation":"A noun clause contains a subject and a finite verb (e.g., that she is brilliant). A former Chief Justice contains neither a subordinating conjunction nor a finite verb \u2014 it is a simple noun phrase. Calling it a clause is structurally impossible, as clauses are defined by the presence of a subject-verb predication."}],"correct":"B","topperRule":"An appositive is a noun or noun phrase placed directly beside another noun to rename or identify it. NON-RESTRICTIVE appositives (set off by commas) add supplementary information and can be removed without changing the essential meaning. RESTRICTIVE appositives (no commas) are essential to identify which specific person or thing is meant.","commonMistake":"Students conflate appositives with predicate nominatives because both rename nouns. The structural test: a predicate nominative ALWAYS follows a linking verb; an appositive sits directly BESIDE the noun it renames with NO verb between them. Verb presence is the diagnostic."},{"id":10,"subtopic":"Nominalisation","difficulty":"Hard","stem":"Which sentence BEST exemplifies the grammatical process of <strong>nominalisation</strong>?","options":[{"label":"A","text":"The CBI investigated the case meticulously.","explanation":"In this sentence investigated is a finite verb in the active past tense \u2014 the word investigate remains in its verbal form. No nominalisation has occurred. This is a standard active-voice declarative sentence showing no conversion of word class."},{"label":"B","text":"The CBI conducted a meticulous investigation of the case.","explanation":"Investigation is the nominalised form of the verb investigate (investigate becomes investigation). Nominalisation converts a verb into a noun: the action is now expressed by a noun (investigation) supported by a semantically lighter verb (conducted). This noun-heavy, formal pattern is classic nominalisation and the correct answer."},{"label":"C","text":"The case was meticulously investigated by the CBI.","explanation":"This sentence converts active voice to passive voice (was investigated), but investigated remains a past participle functioning as part of the verb phrase. Voice transformation is not nominalisation \u2014 the word still operates as a verb. Nominalisation requires the verb to shift word class and become a noun."},{"label":"D","text":"Investigating the case took the CBI six months.","explanation":"Investigating here is a gerund \u2014 an -ing form functioning as the subject of the sentence. Gerunds are a form of nominalisation, making this a plausible answer. However, option B demonstrates the more canonical and examiner-standard form of nominalisation (the abstract noun investigation with its dedicated suffix), making B the superior answer."}],"correct":"B","topperRule":"Nominalisation converts verbs (or adjectives) into nouns: decide becomes decision, investigate becomes investigation, apply becomes application, achieve becomes achievement. Key suffixes signalling nominalisation: -tion/-sion, -ment, -ance/-ence, -ure, -al, -ity, -ness. Nominalised style is characteristic of legal, academic, and bureaucratic writing.","commonMistake":"Students confuse passive voice with nominalisation. Passive voice (was investigated) still uses the verb in participial form \u2014 tense and agreement still apply. True nominalisation replaces the verb entirely with a noun (investigation), which can then take articles, adjectives, and plurals. If the action word can still be conjugated, it has not been nominalised."},{"id":11,"subtopic":"Countable and Uncountable Nouns","difficulty":"Hard","stem":"In which sentence is the word <em>hair</em> used correctly as a <strong>countable noun</strong>?","options":[{"label":"A","text":"She has gorgeous hair.","explanation":"Hair in this sentence is an UNCOUNTABLE mass noun referring to the entire growth of hair on a person\u2019s head as a collective whole. The absence of a numeral confirms uncountable usage. This sentence is correct but demonstrates the uncountable sense, not the countable one."},{"label":"B","text":"The detective found three hairs on the victim\u2019s collar.","explanation":"Three hairs uses hair as a COUNTABLE noun. When referring to individual strands or filaments, hair becomes countable and can be pluralised with a number: one hair, two hairs, three hairs. The forensic context of finding discrete strands makes the countable use natural and correct. This is the answer."},{"label":"C","text":"There is hair all over the bathroom floor.","explanation":"There is hair uses hair as an UNCOUNTABLE mass noun \u2014 an unspecified, unquantified amount of shed hair. The singular verb is confirms the uncountable usage. This parallels there is water on the floor \u2014 a substance treated as an undifferentiated mass."},{"label":"D","text":"Her hair was blowing in the wind.","explanation":"Her hair treats hair as an uncountable noun representing the collective head of hair as a unified whole. No numeral or count marker appears and no plural form is used. This is the most common everyday uncountable usage of the word."}],"correct":"B","topperRule":"Many English nouns are DUAL-CLASS \u2014 they function as both countable and uncountable depending on meaning: hair (mass or individual strand), paper (material or document), glass (substance or vessel), light (illumination or fixture), time (duration or occasion). Always determine grammatical class from context, not from the word alone.","commonMistake":"Students treat hair as permanently uncountable and are surprised that it can be countable. When referring to the collective growth on a head or body, hair is uncountable (her hair is long). When referring to individual filaments or strands, it is countable (two grey hairs). Meaning drives grammatical class."},{"id":12,"subtopic":"Collective Nouns and Agreement","difficulty":"Hard","stem":"Which statement is <strong>correct</strong> in formal British English regarding subject-verb agreement with collective nouns?","options":[{"label":"A","text":"The jury has reached a verdict is the ONLY correct form.","explanation":"While The jury has reached a verdict is grammatically correct (treating the jury as a single unified entity), it is NOT the only correct form in British English. British English allows collective nouns to take either singular or plural verbs depending on whether the group is viewed as a unit or as individuals. Claiming it is the only form is too restrictive."},{"label":"B","text":"The jury are still deliberating is correct in British English when members act individually.","explanation":"In formal British English, collective nouns (jury, committee, government, team) may take a plural verb when the individual members are viewed as acting separately or exercising individual judgement. The jury are still deliberating is entirely standard and correct in British English, emphasising that each juror is weighing evidence individually. This is the correct answer."},{"label":"C","text":"Using a plural verb with jury is always an error regardless of variety.","explanation":"This is incorrect. It is true in American English \u2014 where collective nouns almost always take singular verbs \u2014 but NOT in British English, where both singular and plural agreement is standard.Follow British English conventions, so marking plural agreement with collective nouns as an error is itself an error in these examinations."},{"label":"D","text":"The jury were arguing among themselves is grammatically incorrect.","explanation":"The jury were arguing among themselves is perfectly correct in British English and is in fact the preferred form here \u2014 among themselves explicitly emphasises individual members, making plural concord natural and required. Labelling this incorrect reflects an American-English bias that does not apply in contexts."}],"correct":"B","topperRule":"British English rule for collective nouns: singular verb = group viewed as ONE UNIT acting in concert (The committee has issued its report); plural verb = group viewed as INDIVIDUALS acting separately (The committee are divided on the issue). The pronoun choice (its vs. their) must be consistent with the verb choice.","commonMistake":"Students trained on American English automatically flag plural verbs with collective nouns as errors. In British English (which Indian competitive examinations follow), The government have announced is grammatically acceptable and often preferred when individual members\u2019 actions are implied. Never mark a British plural-agreement sentence as wrong without checking the context."},{"id":13,"subtopic":"Proper Nouns","difficulty":"Easy","stem":"In the sentence <em>\u201cHe is the Einstein of our times.\u201d</em> The word <em>Einstein</em> is grammatically functioning as:","options":[{"label":"A","text":"A proper noun referring to the physicist Albert Einstein","explanation":"In its standard use, Einstein is a proper noun \u2014 the name of the specific historical physicist. However, in this sentence, Einstein is NOT referring to the actual individual Albert Einstein. The phrase the Einstein of our times uses the name metaphorically. The presence of the article the signals that the proper noun has shifted function."},{"label":"B","text":"A common noun used to denote a type or category of person","explanation":"When a proper noun is used with an article to represent a type, quality, or class of person rather than the specific individual, it functions as a COMMON NOUN (the rhetorical device is called antonomasia). The Einstein of our times means a genius of Einstein\u2019s calibre. The article the is the key marker: proper nouns do not normally take articles; when they do, they have been commonised. This is the correct answer."},{"label":"C","text":"An abstract noun denoting the concept of genius","explanation":"Abstract nouns name intangible qualities or concepts (genius, wisdom, justice). While the word Einstein evokes the concept of genius, it remains a nominal denoting a person-type, not a disembodied abstract quality. Einstein still names a category of person, not an abstract concept independent of personhood. It is a common noun, not an abstract one."},{"label":"D","text":"An appositive noun phrase identifying the subject","explanation":"An appositive is placed directly beside a noun to rename or identify it. In this sentence, Einstein follows the linking verb is as a predicate nominative \u2014 it renames the subject he through the copula. It is not positioned beside another noun in apposition but is instead the complement of a linking verb."}],"correct":"B","topperRule":"Proper nouns can be commonised through antonomasia \u2014 using a specific name to represent a type or quality. Key signals: the noun takes a definite or indefinite article (a Hitler, the Shakespeare of our age), often takes a plural (many Einsteins), and denotes a category rather than an individual. This is heavily tested in advanced grammar sections.","commonMistake":"Students automatically classify any capitalised word as a proper noun. The presence of the article the before Einstein is the grammatical signal that the noun has shifted to common-noun function. A proper noun in its standard sense does not take an article: we say Einstein discovered relativity, not the Einstein discovered relativity."},{"id":14,"subtopic":"Possessive Case","difficulty":"Medium","stem":"Ravi and Priya each own <strong>separate</strong> laptops. Which sentence correctly expresses individual possession?","options":[{"label":"A","text":"Ravi and Priya\u2019s laptops are on the table.","explanation":"Ravi and Priya\u2019s is the JOINT possessive form \u2014 adding apostrophe-s only to the last noun in the series implies that both persons share the same set of items jointly. Since the question specifies SEPARATE ownership, this form is misleading and grammatically inapt for the intended meaning."},{"label":"B","text":"Ravi\u2019s and Priya\u2019s laptops are on the table.","explanation":"Ravi\u2019s and Priya\u2019s uses INDIVIDUAL possessives \u2014 adding apostrophe-s to EACH noun in the series. This form signals that each person owns their own laptop separately. The rule: for individual or separate ownership, every noun in the series takes the possessive marker. This is the correct sentence."},{"label":"C","text":"Ravi\u2019s and Priya laptops are on the table.","explanation":"This form marks Ravi\u2019s possession with apostrophe-s but leaves Priya without a possessive inflection, making the sentence grammatically hybrid and incomplete. When expressing individual ownership in a series, every noun must carry the possessive marker. Marking only one noun creates an asymmetric, non-standard construction."},{"label":"D","text":"Ravi and Priyas\u2019 laptops are on the table.","explanation":"Priyas\u2019 treats Priya as if it were a plural noun ending in -s and then adds only the apostrophe (as one would for a regular plural: boys\u2019). But Priya is a singular proper noun \u2014 its possessive is Priya\u2019s (with apostrophe-s), not Priyas\u2019. This error confuses singular possessive formation with regular plural possessive formation."}],"correct":"B","topperRule":"JOINT ownership (shared item): add \u2019s only to the LAST noun \u2014 Ravi and Priya\u2019s house (one house, co-owned). INDIVIDUAL or SEPARATE ownership: add \u2019s to EACH noun \u2014 Ravi\u2019s and Priya\u2019s houses (each has their own). The position and number of apostrophes changes the meaning entirely. This distinction is a signature trap.","commonMistake":"Students use the joint possessive regardless of whether ownership is shared or individual. Always ask: do they own ONE thing TOGETHER, or do they EACH own their own? The answer determines whether one or both nouns take apostrophe-s. Ignoring this distinction produces a sentence that misrepresents the intended ownership relationship."},{"id":15,"subtopic":"Material Nouns","difficulty":"Medium","stem":"In which sentence does the word <em>gold</em> function as a <strong>material noun</strong>?","options":[{"label":"A","text":"She has a heart of gold.","explanation":"In a heart of gold, the word gold functions within a fixed idiomatic expression meaning a kind or generous nature. The entire phrase heart of gold is idiomatic; gold here is not naming the metallic substance itself but contributing to a figurative meaning. This is adjectival usage, not a material noun."},{"label":"B","text":"She won the gold at the Olympics.","explanation":"Here, the gold is used as a COMMON NOUN \u2014 a short form for the gold medal. Gold names a specific prize or award in this context, functioning as a common noun that can take the definite article and be the direct object of won. It does not refer to the raw metallic substance."},{"label":"C","text":"The bracelet is crafted from pure gold.","explanation":"Gold in crafted from pure gold is a MATERIAL NOUN \u2014 it names the raw physical substance from which the bracelet is made. Material nouns name the matter or substance of which concrete things are composed (gold, silver, iron, wood, cotton, glass). This is the precise material-noun usage and the correct answer."},{"label":"D","text":"The gold standard was abandoned in 1971.","explanation":"In gold standard, the word gold functions as an ATTRIBUTIVE ADJECTIVE modifying the noun standard. It describes the type or nature of the standard, not naming the substance itself in isolation. When a noun is used attributively to modify another noun, it takes on adjectival function and is not functioning as a material noun."}],"correct":"C","topperRule":"Material nouns name the RAW SUBSTANCE or MATTER from which things are made: gold, silver, iron, wood, cotton, silk, clay, glass, rubber, leather. They are uncountable in their material sense: Gold is valuable (generic, no article). The same word often performs different grammatical functions depending on context \u2014 always identify function from usage, not from the word alone.","commonMistake":"Students identify gold as a material noun in every sentence regardless of its function. Gold is a material noun ONLY when it names the physical substance. When it is part of an idiom (heart of gold), acts as a short form for a medal (won the gold), or functions as an attributive adjective (gold standard), it is not being used as a material noun."},{"id":16,"subtopic":"Noun Functions","difficulty":"Hard","stem":"In the sentence <em>\u201cThe board appointed Aditi director of operations.\u201d</em> The noun <em>director</em> functions as:","options":[{"label":"A","text":"A second direct object of the verb appointed","explanation":"The direct object of appointed is Aditi \u2014 she is the person who receives the action of being appointed. Director is not a second direct object because it cannot independently receive the action of appointed. The structure follows the transitive complement pattern, not a double-object pattern."},{"label":"B","text":"An indirect object indicating the role given","explanation":"An indirect object indicates to whom or for whom an action is done and typically appears between the verb and the direct object. Director appears AFTER the direct object Aditi and does not receive the action; it describes the role Aditi assumes. This makes it impossible for director to be the indirect object."},{"label":"C","text":"An object complement renaming the direct object","explanation":"Director is an OBJECT COMPLEMENT \u2014 a noun that follows the direct object (Aditi) and renames or identifies it, completing the meaning of the sentence. The pattern is: Subject + Verb + Direct Object + Object Complement. The board appointed Aditi (DO) director of operations (OC). Director states what Aditi BECOMES as a result of the appointment. This is the precise grammatical label."},{"label":"D","text":"A predicate nominative after an implied linking verb","explanation":"A predicate nominative follows a LINKING verb (is, was, seems, becomes) and renames the SUBJECT. In this sentence, appointed is a transitive action verb, not a linking verb, and director renames the OBJECT (Aditi), not the subject (the board). The grammatical structure does not support a predicate nominative analysis."}],"correct":"C","topperRule":"Object complements follow transitive verbs and rename or describe the DIRECT OBJECT. Verbs that commonly take noun object complements: appoint, elect, name, call, consider, make, choose, declare, crown, deem \u2014 e.g., They named her chairperson, We elected him president. Distinguish from predicate nominatives, which follow LINKING verbs and rename the SUBJECT.","commonMistake":"Students confuse object complements with predicate nominatives because both involve a noun renaming another noun. The two-step diagnostic: (1) What is the verb type \u2014 linking or transitive action? (2) Which noun is being renamed \u2014 the subject or the object? Predicate nominative links to SUBJECT via linking verb. Object complement links to OBJECT via action verb."},{"id":17,"subtopic":"Countable and Uncountable Nouns","difficulty":"Medium","stem":"Choose the sentence that is <strong>grammatically correct</strong> in its use of quantifiers with nouns:","options":[{"label":"A","text":"I have little friends who truly understand me.","explanation":"Little is the quantifier for UNCOUNTABLE nouns (little water, little time, little hope). Friends is a COUNTABLE noun and must be quantified with few, not little. The correct sentence is: I have few friends who truly understand me. Using little with a countable noun is a straightforward quantifier agreement error."},{"label":"B","text":"She showed few courage in facing the challenge.","explanation":"Few is the quantifier for COUNTABLE nouns (few books, few days, few people). Courage is an UNCOUNTABLE abstract noun and must be quantified with little, not few. The correct sentence is: She showed little courage in facing the challenge. This error is the mirror image of option A."},{"label":"C","text":"There is little hope of an amicable resolution.","explanation":"Little hope is grammatically correct. Hope in this context is an uncountable noun denoting a general feeling or state. Little is the appropriate quantifier for uncountable nouns. The sentence is idiomatically natural, grammatically precise, and typical of formal legal or journalistic writing. This is the correct option."},{"label":"D","text":"There are few informations available on this matter.","explanation":"This sentence contains two errors. First, information is an UNCOUNTABLE noun in English \u2014 the plural form informations does not exist. Second, because information is uncountable, it requires the singular verb is and the quantifier little, not few. The correct sentence: There is little information available on this matter."}],"correct":"C","topperRule":"The FEW/LITTLE rule is among the most tested in competitive examinations: FEW = countable nouns (few students, few options); LITTLE = uncountable nouns (little water, little courage, little hope). Corollary: MANY = countable; MUCH = uncountable. FEWER = countable (fewer mistakes); LESS = uncountable (less noise).","commonMistake":"Students interchange few and little without checking the countability of the noun they modify. A reliable test: can the noun be pluralised and counted with numbers? If yes (three friends, six options), use few/many/fewer. If no (courage, information, hope), use little/much/less. Forgetting that information is uncountable is one of the most penalised errors in grammar sections."},{"id":18,"subtopic":"Noun Phrases","difficulty":"Hard","stem":"Which of the following is a <strong>noun phrase</strong> and NOT a noun clause?","options":[{"label":"A","text":"What the tribunal decided","explanation":"What the tribunal decided is a NOUN CLAUSE \u2014 it contains a subject (the tribunal) and a finite verb (decided), introduced by the interrogative pronoun what functioning as a nominal relative pronoun. The presence of a subject-verb predication within the group of words makes it a clause, not a phrase."},{"label":"B","text":"The landmark ruling of the apex court","explanation":"The landmark ruling of the apex court is a NOUN PHRASE \u2014 it has a head noun (ruling), pre-modified by a determiner (the) and an adjective (landmark), and post-modified by the prepositional phrase of the apex court. Crucially, it contains NO finite verb. A phrase is a group of words built around a head word without a subject-verb predication. This is the correct answer."},{"label":"C","text":"That procedural justice was denied","explanation":"That procedural justice was denied is a NOUN CLAUSE \u2014 introduced by the complementiser that, it contains a subject (procedural justice) and a finite passive verb (was denied). The complementiser that signals the opening of a noun clause, not a phrase. The subject-verb structure within the group of words is the defining feature of a clause."},{"label":"D","text":"Whoever filed the original complaint","explanation":"Whoever filed the original complaint is a NOUN CLAUSE \u2014 a free relative clause where whoever is a nominal relative pronoun functioning as both the subject of filed and the introducer of the clause. The group of words contains a subject (whoever) and a finite verb (filed), confirming clause status. It is not a phrase."}],"correct":"B","topperRule":"The fundamental distinction: a PHRASE is a group of words with a head word but NO finite verb. A CLAUSE has both a subject and a finite verb. A NOUN PHRASE has a noun as its head, possibly surrounded by determiners, adjectives, and prepositional phrases, but with no finite verb inside it.","commonMistake":"Students see a group of words performing a noun function and immediately call it a noun clause. The decisive test: Is there a finite verb (a verb with tense and a grammatical subject) inside the group of words? If YES, it is a noun clause. If NO, it is a noun phrase. The ruling of the court (no finite verb) is a phrase; what the court ruled (finite verb: ruled) is a clause."},{"id":19,"subtopic":"Number: Singular and Plural","difficulty":"Medium","stem":"Identify the sentence containing a <strong>number agreement error</strong> in noun usage:","options":[{"label":"A","text":"The police are investigating three separate incidents.","explanation":"Police is a plural noun in English, treated as a collective plural that always takes a plural verb. The police ARE investigating is correct. The noun police has no singular form; individual officers are referred to as a police officer. This sentence is grammatically correct."},{"label":"B","text":"The cattle was grazing in the meadow.","explanation":"Cattle is a plural noun in English \u2014 it has no singular form and always takes a plural verb. The correct sentence is: The cattle WERE grazing in the meadow. Like police, cattle is always grammatically plural. Was (singular verb) with cattle (plural noun) is a number agreement error. This is the answer."},{"label":"C","text":"The scissors were left on the counter.","explanation":"Scissors is a plurale tantum \u2014 a noun that exists only in plural form and always takes a plural verb. The scissors WERE left is correct. Like trousers, spectacles, tongs, and pliers, scissors refers to an object with two joined parts and is grammatically plural without exception."},{"label":"D","text":"The species discovered last year are now classified.","explanation":"Species is a noun with identical singular and plural forms \u2014 one species, two species. In this sentence the context implies multiple species (reinforced by are), making the plural interpretation grammatically sound. The sentence is correct: species (plural) + are (plural verb) is proper agreement."}],"correct":"B","topperRule":"Several English nouns are permanently PLURAL and always take plural verbs: cattle, police, poultry, people (when meaning persons), vermin, clergy. There is no singular form for these words \u2014 you cannot say a cattle or a police (you must say a head of cattle or a police officer). Treating them as singular is a number agreement error.","commonMistake":"Students mistakenly treat cattle as a singular collective noun similar to flock or herd and write the cattle was. Unlike true collective nouns (which can take either singular or plural verbs), cattle is ALWAYS plural and ALWAYS takes a plural verb. The same applies to police, poultry, and people (in the sense of persons)."},{"id":20,"subtopic":"Case of Nouns and Pronouns","difficulty":"Hard","stem":"In the sentence <em>\u201cIt is I who am responsible, not him.\u201d</em> Which analysis is <strong>grammatically correct</strong> in formal written English?","options":[{"label":"A","text":"Both I and him are correctly used in their respective cases.","explanation":"While I is correctly in the nominative case as a predicate nominative after the linking verb is, the word him is NOT correctly used. Him is in the objective case, but it appears in a position that requires the nominative case \u2014 it contrasts with I (nominative) and therefore must also be nominative: not he. This analysis incorrectly validates the erroneous him."},{"label":"B","text":"I is correct, but him should be he in formal grammar.","explanation":"This is the correct analysis. I is rightly in the nominative case as a predicate nominative after the linking verb is (It is I). Him (objective case) is incorrectly used \u2014 it contrasts with the predicate nominative I, and parallel formal grammar requires it also to be in the nominative: not he. The formally correct sentence is: It is I who am responsible, not he."},{"label":"C","text":"I should be replaced with me to conform to modern formal usage.","explanation":"Colloquial English widely accepts It\u2019s me, but in formal written English \u2014 the standard for and legal drafting \u2014 the prescriptive rule requires the nominative case (predicate nominative) after a linking verb: It is I. Replacing I with me introduces an objective-case form where a predicate nominative is grammatically required. Colloquial acceptance does not override formal examination standards."},{"label":"D","text":"I is in the objective case and incorrectly used; him is correctly used.","explanation":"This analysis reverses the correct assessment. I is the NOMINATIVE case pronoun and is correctly used as the predicate nominative after the linking verb is. Him is the OBJECTIVE case and is incorrectly used here \u2014 it should be the nominative he to maintain case consistency with the predicate nominative I. This option misidentifies both pronouns."}],"correct":"B","topperRule":"After a LINKING VERB (is, was, were, am, are, been), the pronoun must be in the NOMINATIVE case as a predicate nominative: It is I/he/she/we/they. When contrasting pronouns in the same sentence, both must be in the SAME case: It is I, not he (both nominative). Formal grammar does not permit mixing cases within a parallel construction.","commonMistake":"Students write It is me and not him because both sound natural in spoken English. However, formal prescriptive grammar mandates the nominative case after linking verbs. The colloquial form It\u2019s me is acceptable in conversation but incorrect in formal written grammar answers. Always match case across parallel pronoun constructions."}]');

// =====================================================================
// STATE
// =====================================================================
var S = {
  chosen:  new Array(QUESTIONS.length).fill(null),
  checked: new Array(QUESTIONS.length).fill(false),
  skipped: new Array(QUESTIONS.length).fill(false),
  score: 0, correct: 0, wrong: 0, skipped_n: 0
};

// =====================================================================
// BOOT
// =====================================================================
window.addEventListener('DOMContentLoaded', function() {
  buildDots();
  buildCards();
});

function buildDots() {
  var wrap = document.getElementById('dots-wrap');
  var html = '';
  for (var i = 0; i < QUESTIONS.length; i++) {
    html += '<button class="dot" id="dot-' + i + '" onclick="scrollToQ(' + i + ')" title="Q' + (i+1) + '">' + (i+1) + '</button>';
  }
  wrap.innerHTML = html;
}

function buildCards() {
  var container = document.getElementById('quiz-container');
  var html = '';
  for (var i = 0; i < QUESTIONS.length; i++) {
    html += buildCard(QUESTIONS[i], i);
  }
  container.innerHTML = html;
}

function buildCard(q, i) {
  var diffCls = q.difficulty === 'Easy' ? 'diff-easy' : q.difficulty === 'Medium' ? 'diff-medium' : 'diff-hard';
  var opts = '';
  for (var j = 0; j < q.options.length; j++) {
    var o = q.options[j];
    opts += '<button class="opt" id="opt-' + i + '-' + o.label + '" onclick="selectOpt(' + i + ',\'' + o.label + '\')">'
          + '<span class="opt-letter">' + o.label + '</span>'
          + '<span class="opt-text">' + htmlEnc(o.text) + '</span>'
          + '</button>';
  }
  return '<div class="card" id="card-' + i + '">'
       + '<div class="q-header">'
       +   '<div class="q-num-badge">' + (i+1) + '</div>'
       +   '<div>'
       +     '<div class="q-subtopic">' + htmlEnc(q.subtopic) + '</div>'
       +     '<div class="q-diff ' + diffCls + '">' + q.difficulty + '</div>'
       +   '</div>'
       + '</div>'
       + '<div class="q-stem">' + q.stem + '</div>'
       + '<div class="options" id="opts-' + i + '">' + opts + '</div>'
       + '<div class="action-row">'
       +   '<button class="btn btn-check" id="check-' + i + '" onclick="checkAns(' + i + ')" disabled>Check Answer</button>'
       +   '<button class="btn btn-skip" id="skip-' + i + '" onclick="skipQ(' + i + ')">Skip</button>'
       + '</div>'
       + '<div id="exp-' + i + '"></div>'
       + '</div>';
}

// =====================================================================
// SELECT
// =====================================================================
function selectOpt(qi, label) {
  if (S.checked[qi] || S.skipped[qi]) return;
  S.chosen[qi] = label;
  var opts = QUESTIONS[qi].options;
  for (var j = 0; j < opts.length; j++) {
    var btn = document.getElementById('opt-' + qi + '-' + opts[j].label);
    if (opts[j].label === label) btn.classList.add('selected');
    else btn.classList.remove('selected');
  }
  document.getElementById('check-' + qi).disabled = false;
}

// =====================================================================
// CHECK
// =====================================================================
function checkAns(qi) {
  if (S.checked[qi]) return;
  S.checked[qi] = true;
  var q = QUESTIONS[qi];
  var chosen = S.chosen[qi];
  var isOk = (chosen === q.correct);

  if (isOk) { S.score += 1;    S.correct++; }
  else       { S.score -= 0.25; S.wrong++; }

  var opts = q.options;
  for (var j = 0; j < opts.length; j++) {
    var btn = document.getElementById('opt-' + qi + '-' + opts[j].label);
    btn.classList.add('locked');
    btn.classList.remove('selected');
    if (opts[j].label === q.correct)               btn.classList.add('opt-correct');
    else if (opts[j].label === chosen && !isOk)    btn.classList.add('opt-wrong');
    else                                           btn.classList.add('opt-dimmed');
  }

  document.getElementById('check-' + qi).style.display = 'none';
  document.getElementById('skip-'  + qi).style.display = 'none';
  renderExp(qi, chosen, isOk, q);
  updateBar();
  updateDot(qi);
}

// =====================================================================
// SKIP
// =====================================================================
function skipQ(qi) {
  if (S.checked[qi] || S.skipped[qi]) return;
  S.skipped[qi] = true; S.skipped_n++;
  var opts = QUESTIONS[qi].options;
  for (var j = 0; j < opts.length; j++) {
    var btn = document.getElementById('opt-' + qi + '-' + opts[j].label);
    btn.classList.add('locked', 'opt-dimmed');
  }
  document.getElementById('check-' + qi).style.display = 'none';
  document.getElementById('skip-'  + qi).style.display = 'none';
  updateBar(); updateDot(qi);

  document.getElementById('exp-' + qi).innerHTML =
    '<div class="exp-panel">'
    + '<div class="exp-head"><span class="exp-verdict">&#8212; Skipped &middot; No mark awarded</span>'
    + '<span class="exp-delta delta-zero">0</span></div>'
    + '<div class="exp-body" style="padding:12px 18px;">'
    + '<p style="font-size:.88rem;color:var(--ink-muted);font-style:italic;">Correct answer: <strong style="color:var(--gold)">'
    + htmlEnc(QUESTIONS[qi].correct) + '</strong></p>'
    + '</div></div>';
}

// =====================================================================
// EXPLANATION
// =====================================================================
function renderExp(qi, chosen, isOk, q) {
  var verdict   = isOk ? '&#10003; Correct &#8212; +1 mark awarded' : '&#10007; Incorrect &#8212; Correct answer: ' + q.correct;
  var deltaText = isOk ? '+1' : '&#8722;0.25';
  var deltaCls  = isOk ? 'delta-pos' : 'delta-neg';

  var optHtml = '';
  for (var j = 0; j < q.options.length; j++) {
    var o = q.options[j];
    var isCor  = (o.label === q.correct);
    var isWrng = (o.label === chosen && !isCor);
    var cls  = isCor ? 'opt-exp oe-correct' : (isWrng ? 'opt-exp oe-wrong' : 'opt-exp');
    var icon = isCor ? '&#10003;' : (isWrng ? '&#10007;' : '&middot;');
    optHtml += '<div class="' + cls + '">'
             + '<div class="oe-label"><span class="oe-ltr">' + icon + ' ' + o.label + '.</span> ' + htmlEnc(o.text) + '</div>'
             + '<div>' + htmlEnc(o.explanation) + '</div>'
             + '</div>';
  }

  document.getElementById('exp-' + qi).innerHTML =
    '<div class="exp-panel">'
    + '<div class="exp-head">'
    +   '<span class="exp-verdict">' + verdict + '</span>'
    +   '<span class="exp-delta ' + deltaCls + '">' + deltaText + '</span>'
    + '</div>'
    + '<div class="exp-body">'
    +   '<div class="opt-exps">' + optHtml + '</div>'
    +   '<div class="insight-row">'
    +     '<div class="insight i-topper"><div class="insight-title">&#127942; Topper\'s Rule</div><div class="insight-text">' + htmlEnc(q.topperRule) + '</div></div>'
    +     '<div class="insight i-mistake"><div class="insight-title">&#9888; Common Mistake</div><div class="insight-text">' + htmlEnc(q.commonMistake) + '</div></div>'
    +   '</div>'
    + '</div>'
    + '</div>';
}

// =====================================================================
// DOTS & SCROLL
// =====================================================================
function updateDot(qi) {
  var dot = document.getElementById('dot-' + qi);
  dot.className = 'dot';
  if (S.skipped[qi])  { dot.classList.add('d-skip'); return; }
  if (!S.checked[qi]) return;
  if (S.chosen[qi] === QUESTIONS[qi].correct) dot.classList.add('d-correct');
  else dot.classList.add('d-wrong');
}

function scrollToQ(i) {
  var el = document.getElementById('card-' + i);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// =====================================================================
// SCORE BAR
// =====================================================================
function updateBar() {
  document.getElementById('live-score').textContent   = S.score.toFixed(2);
  document.getElementById('live-correct').textContent = S.correct;
  document.getElementById('live-wrong').textContent   = S.wrong;
  document.getElementById('live-skip').textContent    = S.skipped_n;
}

// =====================================================================
// FINISH
// =====================================================================
function finishTest() {
  for (var i = 0; i < QUESTIONS.length; i++) {
    if (!S.checked[i] && !S.skipped[i]) skipQ(i);
  }
  document.getElementById('quiz-container').style.display = 'none';
  document.getElementById('dots-wrap').style.display = 'none';
  document.querySelector('.finish-wrap').style.display = 'none';

  var res = document.getElementById('results');
  res.style.display = 'block';
  res.scrollIntoView({ behavior: 'smooth', block: 'start' });

  var pct = (S.score / QUESTIONS.length) * 100;
  var grade, label;
  if      (pct >= 90) { grade = 'A+'; label = 'Outstanding — Examiner Standard'; }
  else if (pct >= 75) { grade = 'A';  label = 'Excellent — Well Prepared'; }
  else if (pct >= 60) { grade = 'B';  label = 'Good — Minor Gaps to Address'; }
  else if (pct >= 40) { grade = 'C';  label = 'Average — Focused Revision Required'; }
  else if (pct >= 20) { grade = 'D';  label = 'Below Average — Revise Fundamentals'; }
  else                { grade = 'F';  label = 'Needs Comprehensive Revision'; }

  document.getElementById('r-grade').textContent   = grade;
  document.getElementById('r-label').textContent   = label;
  document.getElementById('r-score').textContent   = S.score.toFixed(2);
  document.getElementById('r-correct').textContent = S.correct;
  document.getElementById('r-wrong').textContent   = S.wrong;
  document.getElementById('r-skip').textContent    = S.skipped_n;

  buildBars();
  buildRoadmap();
}

// =====================================================================
// SUBTOPIC BARS
// =====================================================================
function buildBars() {
  var map = {};
  for (var i = 0; i < QUESTIONS.length; i++) {
    var st = QUESTIONS[i].subtopic;
    if (!map[st]) map[st] = { total: 0, correct: 0 };
    map[st].total++;
    if (S.checked[i] && S.chosen[i] === QUESTIONS[i].correct) map[st].correct++;
  }
  window._stMap = map;

  var keys = Object.keys(map);
  var html = '';
  for (var k = 0; k < keys.length; k++) {
    var name = keys[k], d = map[name];
    var p = d.total ? Math.round((d.correct / d.total) * 100) : 0;
    var fc = p >= 70 ? 'fill-hi' : p >= 40 ? 'fill-mid' : 'fill-lo';
    html += '<div>'
          + '<div class="st-top"><span class="st-name">' + htmlEnc(name) + '</span>'
          + '<span class="st-score-txt">' + d.correct + '/' + d.total + ' (' + p + '%)</span></div>'
          + '<div class="st-track"><div class="st-fill ' + fc + '" style="width:0%" data-t="' + p + '"></div></div>'
          + '</div>';
  }
  document.getElementById('st-bars').innerHTML = html;
  setTimeout(function() {
    var fills = document.querySelectorAll('.st-fill[data-t]');
    for (var f = 0; f < fills.length; f++) fills[f].style.width = fills[f].getAttribute('data-t') + '%';
  }, 120);
}

var RD = {
  'Types of Nouns':{'w':'10-12% of grammar questions','tips':['Use the 5-senses test: if you cannot perceive it, it is abstract.','Memorise all four broad categories with 5 examples each.','Practice classifying dual-function words (light, work) by context.'],'traps':['Collective nouns are often mistaken for abstract nouns; they name real groups.','Gerunds (-ing forms as nouns) are regularly mislabelled as verbs.']},
  'Collective Nouns':{'w':'8-10% of vocabulary questions','tips':['Group animals by ecosystem: aquatic (pod/school), aerial (flock/skein), terrestrial (pride/pack).','Make flashcards for the 20 most tested collective nouns.','Remember: school = fish ONLY; pod = whales/dolphins.'],'traps':['A school of whales is the most tested collective noun error.','Herd is used for cattle, deer, and elephants; students over-extend it.']},
  'Countable and Uncountable Nouns':{'w':'15-18% of grammar sections','tips':['Test a noun: can you put a number before it and pluralise it? If yes, countable.','Memorise deceptive uncountable nouns: information, advice, furniture, luggage, news, equipment.','Learn partitive constructions: a piece of advice, an item of information.'],'traps':['The news are is one of the most penalised errors; news is always singular.','Informations and advices are non-standard; these nouns have no plural form.']},
  'Plural Formation':{'w':'8-10% of grammar questions','tips':['Memorise Latin/Greek plurals in sets: -um/-a, -us/-i, -on/-a, -ix/-ices.','For foreign-origin words fully absorbed into English (mongoose), apply regular -s/-es.','Context determines the correct plural: indexes (books) vs. indices (mathematics).'],'traps':['Mongeese is a widespread folk form but non-standard; the correct plural is mongooses.','Phenomenons is always wrong; phenomena is the only accepted plural in formal English.']},
  'Possessive Case':{'w':'12-15% of grammar sections','tips':['Irregular plurals not ending in -s (children, men, women) take apostrophe-s: children\'s.','Regular plurals ending in -s (boys, students) take only an apostrophe: boys\'.','Joint ownership: apostrophe-s on last noun only. Individual ownership: apostrophe-s on each.'],'traps':['Childrens\' is doubly wrong because childrens is not a word.','Students confuse joint and individual possession: Ravi and Priya\'s car vs. Ravi\'s and Priya\'s cars.']},
  'Noun Clauses':{'w':'10-12% of advanced grammar questions','tips':['Identify noun clauses by substitution: replace the clause with it or this.','Noun clauses are introduced by: that, what, who, whom, whoever, whichever, whether, if.','Practice identifying the grammatical function: subject, direct object, or subject complement.'],'traps':['Adverbial clauses answer how/when/where/why; noun clauses fill subject/object slots.','That can introduce a noun clause (complementiser) OR a relative clause; check what it refers to.']},
  'Compound Nouns':{'w':'6-8% of grammar questions','tips':['For hyphenated compounds, identify the head noun first; that is where the plural goes.','Memorise legal/formal compounds: attorneys-general, courts-martial, commanders-in-chief.','Spelling matters: some compounds are one word, some hyphenated, some two words.'],'traps':['Adding -s to the last word (attorney-generals) is the default error; resist this reflex.','Gerund compounds (swimming pool) pluralise the head noun, not the gerund.']},
  'Gender of Nouns':{'w':'5-7% of vocabulary questions','tips':['Memorise Latin-origin pairs for legal English: executor/executrix, testator/testatrix.','For common nouns, -ess suffix forms the feminine: actor/actress, host/hostess.','Modern exams focus on traditional formal pairs.'],'traps':['Applying -ess to Latinate legal nouns (executress) is wrong; use -trix for Latin-origin titles.','Executrices is the plural of executrix, not the feminine singular.']},
  'Appositive Nouns':{'w':'6-8% of advanced grammar questions','tips':['Test: can you remove the phrase without changing the core meaning? If yes, it is non-restrictive.','Appositives always rename the immediately preceding noun.','Distinguish appositive from predicate nominative: appositive sits beside the noun with no verb between them.'],'traps':['Students confuse appositives with predicate nominatives; the linking verb is the diagnostic.','Restrictive vs. non-restrictive: My friend Ramesh (no comma) vs. My friend, Ramesh (comma).']},
  'Nominalisation':{'w':'8-10% of advanced grammar sections','tips':['Recognise nominalisation suffixes: -tion/-sion, -ment, -ance/-ence, -ure, -al, -ity, -ness.','Nominalised style is common in legal, academic, and bureaucratic writing.','Practise converting verbs to nouns and vice versa for clause-rewriting questions.'],'traps':['Passive voice (was investigated) is NOT nominalisation; the verb remains a verb.','Gerunds are a mild form of nominalisation but not the canonical examiner-standard example.']},
  'Noun Functions':{'w':'10-12% of advanced grammar questions','tips':['Map the five noun functions: subject, direct object, indirect object, subject complement, object complement.','Object complement test: does it follow the DO and rename or describe it? If yes, it is an OC.','Verbs that take OCs: appoint, elect, name, call, consider, make, declare, deem, choose.'],'traps':['Confusing object complement with indirect object; an IO answers to whom or for whom.','Confusing object complement with predicate nominative; the verb type is the key.']},

  'Case of Nouns and Pronouns':{'w':'8-10% of grammar sections','tips':['After linking verbs, use nominative case pronouns as predicate nominatives: It is I, not It is me (formal).','When contrasting pronouns, ensure both are in the same case: It is I, not he (both nominative).','Memorise the nominative/objective pairs: I/me, he/him, she/her, we/us, they/them, who/whom.'],'traps':['It is me sounds natural in speech but is wrong in formal grammar examinations.','Students mix cases in contrasting constructions: It is I, not him mixes nominative and objective.']}
};

function buildRoadmap() {
  var map = window._stMap || {};
  var keys = Object.keys(map).sort(function(a, b) {
    var pa = map[a].total ? map[a].correct / map[a].total : 0;
    var pb = map[b].total ? map[b].correct / map[b].total : 0;
    return pa - pb;
  });
  var html = '';
  for (var k = 0; k < keys.length; k++) {
    var name = keys[k], d = map[name];
    var p = d.total ? d.correct / d.total : 0;
    var priority = p < 0.5 ? 'High' : p < 0.75 ? 'Medium' : 'Low';
    var priCls   = priority === 'High' ? 'p-high' : priority === 'Medium' ? 'p-mid' : 'p-low';
    var badgeCls = priority === 'High' ? 'b-high' : priority === 'Medium' ? 'b-mid' : 'b-low';
    var rd = RD[name] || { w: 'See grammar references', tips: [], traps: [] };
    var tips = '', traps = '';
    for (var t = 0; t < rd.tips.length;  t++) tips  += '<li>' + htmlEnc(rd.tips[t])  + '</li>';
    for (var r = 0; r < rd.traps.length; r++) traps += '<li>' + htmlEnc(rd.traps[r]) + '</li>';
    html += '<div class="rm-item ' + priCls + '">'
          + '<div class="rm-top">' + htmlEnc(name) + '<span class="rm-badge ' + badgeCls + '">' + priority + ' Priority</span></div>'
          + '<div class="rm-weight">Exam Weight: ' + htmlEnc(rd.w) + '</div>'
          + '<div class="rm-grid">'
          +   '<div><div class="rm-col-title">Study Tips</div><ul class="rm-list">' + tips + '</ul></div>'
          +   '<div><div class="rm-col-title">Examiner Traps</div><ul class="rm-list">' + traps + '</ul></div>'
          + '</div></div>';
  }
  document.getElementById('roadmap').innerHTML = html;
}

// =====================================================================
// UTILITY
// =====================================================================
function htmlEnc(s) {
  if (typeof s !== 'string') return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
