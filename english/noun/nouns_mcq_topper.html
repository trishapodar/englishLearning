<style>
:root{--parchment:#f7eed8;--parchment-mid:#ede0be;--parchment-deep:#e0cfa0;--ink:#180f02;--ink-mid:#3a2808;--ink-muted:#7a5c30;--gold:#a87a0a;--gold-bright:#c99010;--gold-pale:#f0d070;--gold-wash:#fdf6e0;--crimson:#7c1515;--crimson-pale:#faeaea;--forest:#153d22;--forest-pale:#e5f5ea;--slate:#3d3d52;--border:#c8a050;--border-light:#ddc070;--border-soft:#e8d8a8;--r:6px;--tx:all .2s cubic-bezier(.4,0,.2,1);}*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}html{scroll-behavior:smooth}body{font-family:'Source Serif 4',Georgia,serif;background:#18100a;background-image:radial-gradient(ellipse 65% 50% at 10% 8%,#3a220a 0%,transparent 65%),radial-gradient(ellipse 50% 45% at 88% 92%,#110a02 0%,transparent 60%);min-height:100vh;color:var(--ink);padding-bottom:70px;}#score-bar{position:sticky;top:0;z-index:200;background:linear-gradient(135deg,#100d07,#221808);border-bottom:2px solid var(--gold);box-shadow:0 2px 20px rgba(0,0,0,.6);padding:8px 16px;}.sb-inner{max-width:860px;margin:0 auto;display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:center;}.sb-label{font-family:'Playfair Display',serif;font-size:.7rem;letter-spacing:.16em;text-transform:uppercase;color:rgba(240,208,112,.45);margin-right:4px;}.pill{display:flex;align-items:center;gap:5px;padding:4px 14px;border-radius:20px;font-family:'Playfair Display',serif;font-size:.82rem;font-weight:700;border:1px solid transparent;white-space:nowrap;}.p-score{background:rgba(168,122,10,.2);color:var(--gold-pale);border-color:rgba(168,122,10,.45);}.p-ok{background:rgba(21,61,34,.28);color:#80e8a8;border-color:rgba(21,61,34,.5);}.p-bad{background:rgba(124,21,21,.28);color:#f0a8a8;border-color:rgba(124,21,21,.5);}.p-skip{background:rgba(61,61,82,.28);color:#c2c2d8;border-color:rgba(61,61,82,.5);}.pn{font-size:1rem;font-weight:900;}.dots-wrap{max-width:860px;margin:0 auto 12px;padding:0 14px;display:flex;flex-wrap:wrap;gap:6px;justify-content:center;}.dot{width:31px;height:31px;border-radius:50%;border:1.5px solid var(--border);background:rgba(20,14,4,.4);font-family:'Playfair Display',serif;font-weight:700;font-size:.72rem;color:rgba(240,208,112,.5);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:var(--tx);flex-shrink:0;}.dot:hover{border-color:var(--gold);color:var(--gold);}.dot.d-ok{background:#2d7a4e;color:#fff;border-color:#2d7a4e;}.dot.d-bad{background:var(--crimson);color:#fff;border-color:var(--crimson);}.dot.d-skip{background:var(--slate);color:#fff;border-color:var(--slate);}#app{max-width:860px;margin:0 auto;padding:0 14px;}.masthead{text-align:center;padding:50px 16px 34px;}.mast-rule{width:120px;height:2px;margin:0 auto;background:linear-gradient(90deg,transparent,var(--gold),transparent);}.mast-rule.top{margin-bottom:24px;}.mast-rule.bot{margin-top:24px;}.masthead h1{font-family:'Playfair Display',serif;font-size:clamp(1.8rem,5vw,2.8rem);font-weight:900;line-height:1.15;color:var(--gold-pale);text-shadow:0 2px 16px rgba(0,0,0,.45);margin-bottom:10px;}.mast-sub{font-style:italic;color:var(--gold);font-size:.92rem;letter-spacing:.06em;opacity:.8;margin-bottom:8px;}.mast-meta{font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(240,208,112,.4);}.card{background:var(--parchment);border:1px solid var(--border);border-radius:8px;box-shadow:0 8px 40px rgba(24,16,2,.3),0 1px 0 rgba(255,255,255,.6) inset;margin-bottom:24px;position:relative;overflow:hidden;animation:cardIn .38s ease both;}.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--gold-bright),var(--border-light),var(--gold-bright));}@keyframes cardIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}.q-hdr{padding:18px 28px 0;display:flex;align-items:center;gap:12px;}.q-num{flex-shrink:0;width:40px;height:40px;border-radius:50%;border:2px solid var(--gold);background:var(--parchment-mid);font-family:'Playfair Display',serif;font-weight:700;font-size:.88rem;color:var(--gold);display:flex;align-items:center;justify-content:center;}.q-tags{flex:1;}.q-sub{font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);border:1px solid var(--border-light);background:var(--parchment-mid);padding:2px 10px;border-radius:20px;display:inline-block;margin-bottom:2px;}.q-diff{font-size:.7rem;color:var(--ink-muted);}.q-stem{padding:16px 28px 20px;font-size:1.06rem;line-height:1.82;color:var(--ink);}.q-stem em{font-style:italic;color:var(--ink-mid);}.q-stem strong{font-weight:700;color:var(--ink);}.options{padding:0 20px;display:grid;gap:9px;}.opt{display:flex;align-items:flex-start;gap:11px;padding:13px 16px;background:var(--parchment-mid);border:1.5px solid var(--border-soft);border-radius:var(--r);cursor:pointer;width:100%;font-family:'Source Serif 4',serif;font-size:.95rem;line-height:1.6;color:var(--ink);text-align:left;transition:var(--tx);}.opt:hover:not(.locked){background:#f0e4c8;border-color:var(--gold);transform:translateX(3px);}.opt.sel:not(.locked){background:#ede0b8;border-color:var(--gold);box-shadow:0 0 0 2px rgba(168,122,10,.2);}.opt.locked{cursor:default;}.opt.c-ok{background:var(--forest-pale);border-color:#2d7a4e;color:var(--forest);}.opt.c-bad{background:var(--crimson-pale);border-color:#b05050;color:var(--crimson);}.opt.c-dim{opacity:.38;}.opt-lt{flex-shrink:0;width:28px;height:28px;border-radius:50%;border:1.5px solid var(--border);background:var(--parchment);font-family:'Playfair Display',serif;font-weight:700;font-size:.78rem;color:var(--ink-muted);display:flex;align-items:center;justify-content:center;transition:var(--tx);margin-top:1px;}.opt.sel .opt-lt{background:var(--gold);color:#fff;border-color:var(--gold);}.opt.c-ok .opt-lt{background:#2d7a4e;color:#fff;border-color:#2d7a4e;}.opt.c-bad .opt-lt{background:var(--crimson);color:#fff;border-color:var(--crimson);}.action-row{padding:16px 20px 20px;display:flex;gap:10px;flex-wrap:wrap;}.btn{display:inline-flex;align-items:center;justify-content:center;padding:10px 28px;border-radius:var(--r);font-family:'Playfair Display',serif;font-weight:700;font-size:.9rem;letter-spacing:.03em;cursor:pointer;border:none;transition:var(--tx);white-space:nowrap;}.btn-check{background:linear-gradient(135deg,var(--gold),#8a6205);color:#fff;box-shadow:0 2px 10px rgba(168,122,10,.35);}.btn-check:hover:not(:disabled){background:linear-gradient(135deg,var(--gold-bright),var(--gold));box-shadow:0 4px 16px rgba(168,122,10,.5);transform:translateY(-1px);}.btn-check:disabled{opacity:.5;cursor:not-allowed;transform:none;}.btn-skip{background:var(--parchment-mid);color:var(--ink-mid);border:1px solid var(--border);}.btn-skip:hover:not(:disabled){background:var(--parchment-deep);border-color:var(--gold);}.btn-skip:disabled{opacity:.38;cursor:not-allowed;}.exp-wrap{margin:0 14px 18px;border:1px solid var(--border-soft);border-radius:var(--r);overflow:hidden;animation:slideIn .32s ease both;}@keyframes slideIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}.exp-hdr{padding:11px 18px;background:linear-gradient(135deg,var(--ink),#2c1f0a);display:flex;align-items:center;gap:10px;}.exp-verdict{font-family:'Playfair Display',serif;font-size:.93rem;font-weight:700;color:var(--gold-pale);}.exp-delta{margin-left:auto;font-family:'Playfair Display',serif;font-weight:700;font-size:.86rem;padding:2px 11px;border-radius:12px;}.d-pos{background:rgba(45,122,78,.3);color:#80e8a8;}.d-neg{background:rgba(124,21,21,.3);color:#f0a8a8;}.d-zero{background:rgba(61,61,82,.3);color:#c2c2d8;}.exp-body{padding:18px;background:var(--gold-wash);}.opt-exps{display:grid;gap:10px;margin-bottom:14px;}.oe{padding:11px 15px;border-radius:var(--r);border-left:3px solid var(--border);background:rgba(255,255,255,.5);font-size:.86rem;line-height:1.7;color:var(--ink-mid);}.oe.oe-ok{border-left-color:#2d7a4e;background:rgba(45,122,78,.06);}.oe.oe-bad{border-left-color:#b05050;background:rgba(176,80,80,.06);}.oe-lbl{font-family:'Playfair Display',serif;font-weight:700;font-size:.77rem;margin-bottom:4px;display:flex;align-items:center;gap:5px;}.oe-ltr{color:var(--gold);}.oe-ok .oe-ltr{color:#2d7a4e;}.oe-bad .oe-ltr{color:#b05050;}.insight-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px;}.insight{padding:13px 15px;border-radius:var(--r);border:1px solid var(--border-soft);}.i-top{background:rgba(21,61,34,.08);border-color:rgba(21,61,34,.25);}.i-err{background:rgba(124,21,21,.08);border-color:rgba(124,21,21,.25);}.ins-title{font-family:'Playfair Display',serif;font-weight:700;font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px;display:flex;align-items:center;gap:5px;}.i-top .ins-title{color:var(--forest);}.i-err .ins-title{color:var(--crimson);}.ins-text{font-size:.85rem;line-height:1.7;color:var(--ink-mid);}.finish-wrap{text-align:center;padding:10px 0 30px;}.btn-finish{background:linear-gradient(135deg,var(--forest),#0f3020);color:#b0f0c8;font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;letter-spacing:.04em;padding:14px 46px;border:none;border-radius:var(--r);cursor:pointer;box-shadow:0 2px 14px rgba(21,61,34,.4);transition:var(--tx);}.btn-finish:hover{background:linear-gradient(135deg,#1d5a35,var(--forest));box-shadow:0 4px 22px rgba(21,61,34,.55);transform:translateY(-2px);}#results{display:none;}.res-card{background:var(--parchment);border:1px solid var(--border);border-radius:8px;overflow:hidden;box-shadow:0 8px 40px rgba(24,16,2,.3);}.res-hdr{padding:42px 32px 28px;text-align:center;border-bottom:1px solid var(--border-soft);}.res-hdr h2{font-family:'Playfair Display',serif;font-size:1.9rem;color:var(--ink);margin-bottom:8px;}.orn{color:var(--border);letter-spacing:.5em;font-size:.85rem;margin:10px 0;opacity:.6;}.grade{font-family:'Playfair Display',serif;font-weight:900;font-size:4rem;color:var(--gold);line-height:1.1;text-shadow:0 2px 8px rgba(0,0,0,.1);}.grade-lbl{font-style:italic;color:var(--ink-muted);font-size:.9rem;margin-top:4px;}.stats{display:flex;gap:18px;justify-content:center;flex-wrap:wrap;margin-top:24px;}.stat{text-align:center;padding:12px 18px;border-radius:var(--r);min-width:80px;}.s-score{background:rgba(168,122,10,.1);border:1px solid var(--border);}.s-correct{background:rgba(21,61,34,.1);border:1px solid rgba(45,122,78,.35);}.s-wrong{background:rgba(124,21,21,.1);border:1px solid rgba(124,21,21,.35);}.s-skip{background:rgba(61,61,82,.1);border:1px solid rgba(61,61,82,.35);}.stat-n{font-family:'Playfair Display',serif;font-size:1.55rem;font-weight:700;display:block;}.s-score .stat-n{color:var(--gold);}.s-correct .stat-n{color:var(--forest);}.s-wrong .stat-n{color:var(--crimson);}.s-skip .stat-n{color:var(--slate);}.stat-l{font-size:.7rem;color:var(--ink-muted);letter-spacing:.1em;text-transform:uppercase;}.res-body{padding:32px 32px;}.sec-hdr{font-family:'Playfair Display',serif;font-size:1.18rem;color:var(--ink);margin-bottom:18px;padding-bottom:8px;border-bottom:1px solid var(--border-soft);display:flex;align-items:center;gap:9px;}.sec-hdr::before{content:'';display:inline-block;width:4px;height:18px;background:var(--gold);border-radius:2px;flex-shrink:0;}.st-bars{display:grid;gap:13px;margin-bottom:32px;}.st-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px;}.st-nm{font-size:.86rem;color:var(--ink-mid);font-weight:600;}.st-sc{font-family:'Playfair Display',serif;font-size:.8rem;font-weight:700;color:var(--gold);}.st-track{height:7px;background:var(--parchment-deep);border-radius:4px;overflow:hidden;}.st-fill{height:100%;border-radius:4px;transition:width 1.2s cubic-bezier(.4,0,.2,1);}.f-hi{background:linear-gradient(90deg,#2d7a4e,#50c080);}.f-mid{background:linear-gradient(90deg,var(--gold),var(--gold-bright));}.f-lo{background:linear-gradient(90deg,var(--crimson),#c04040);}.roadmap{display:grid;gap:15px;}.rm{padding:18px 20px;background:var(--parchment-mid);border:1px solid var(--border-soft);border-radius:var(--r);border-left:4px solid var(--gold);}.rm.rp-hi{border-left-color:var(--crimson);}.rm.rp-mid{border-left-color:var(--gold);}.rm.rp-lo{border-left-color:var(--forest);}.rm-top{font-family:'Playfair Display',serif;font-size:.96rem;font-weight:700;color:var(--ink);margin-bottom:3px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}.rm-badge{font-size:.64rem;letter-spacing:.09em;text-transform:uppercase;padding:2px 8px;border-radius:12px;font-weight:600;}.bh{background:rgba(124,21,21,.14);color:var(--crimson);}.bm{background:rgba(168,122,10,.14);color:var(--gold);}.bl{background:rgba(21,61,34,.14);color:var(--forest);}.rm-w{font-size:.74rem;color:var(--ink-muted);font-style:italic;margin-bottom:10px;}.rm-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}.rm-ct{font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:4px;}.rm-list{list-style:none;}.rm-list li{font-size:.84rem;color:var(--ink-mid);line-height:1.55;padding-left:13px;position:relative;margin-bottom:4px;}.rm-list li::before{content:'\203A';position:absolute;left:0;color:var(--gold);font-weight:700;}.restart-wrap{text-align:center;margin-top:30px;}.btn-restart{background:linear-gradient(135deg,var(--gold),#8a6205);color:#fff;font-family:'Playfair Display',serif;font-size:.92rem;font-weight:700;letter-spacing:.04em;padding:12px 40px;border:none;border-radius:var(--r);cursor:pointer;box-shadow:0 2px 12px rgba(168,122,10,.35);transition:var(--tx);}.btn-restart:hover{background:linear-gradient(135deg,var(--gold-bright),var(--gold));transform:translateY(-1px);}@media(max-width:600px){.q-hdr,.q-stem,.action-row,.res-hdr,.res-body{padding-left:16px;padding-right:16px;}.options{padding:0 12px;}.exp-wrap{margin:0 10px 16px;}.insight-row,.rm-grid{grid-template-columns:1fr;}.grade{font-size:2.8rem;}}
