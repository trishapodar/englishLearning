{"Noun Clauses": {"w": "12-15%", "tips": ["Content complement clauses (that-clauses of NPs) specify the propositional content of abstract nouns: fact, claim, allegation, belief, assumption. They are introduced by the complementiser 'that', not the relative pronoun 'that'.", "Test: can you replace 'that' with 'which'? If YES → relative clause. If NO → content complement clause.", "Free relative clauses (what, whoever, whatever) function as noun clauses and can fill both subject and predicate nominative positions simultaneously around a linking verb."], "traps": ["Classifying content complement clauses as relative clauses because both can be introduced by 'that' — the 'which' substitution test is the diagnostic.", "Failing to identify 'whether/what' clauses as predicate nominatives after linking verbs ('What concerns me is whether X' — both slots are noun clauses)."]}, "Nominalisation": {"w": "10-12%", "tips": ["When propositional verbs (decide, allege, conclude, assume) are nominalised, their complement clauses become content complements of the deverbal noun: 'decided that X' → 'decision that X'.", "To identify ALL nominalisations: unpack every noun in the sentence and test whether it derives from a verb. Look for -ure, -tion, -ment, -ance suffixes and zero-converted verbs.", "Legal prose stacks nominalisations: identify each one and its underlying verbal predicate to fully analyse sentence structure."], "traps": ["Identifying only ONE nominalisation per sentence and stopping — legal sentences typically contain multiple stacked nominalisations.", "Confusing the residue that-clause after a deverbal noun for a relative clause — use the 'which' substitution test."]}, "Possessive Case": {"w": "10-12%", "tips": ["Nominalised adjectives used as singular count nouns (the accused, the deceased) take regular singular possessive 's: 'the accused’s defence'.", "Genitive + gerund construction is the FORMALLY PRESCRIBED standard in legal writing: 'the court’s having refused', 'his refusing to testify'.", "The classical proper-name exception (Jesus', Sophocles') for apostrophe-only applies ONLY to classical proper names, not to common nouns like 'the accused'."], "traps": ["Refusing to inflect nominalised adjectives (the accused, the deceased) possessively, assuming they are immutable forms.", "Treating 'the court refusing' (accusative + participle) as more formal than 'the court’s refusing' (genitive + gerund) — the genitive form is the formal standard."]}, "Noun Functions": {"w": "10-12%", "tips": ["Adjectival object complement after causative/factitive verbs (render, make, find, consider, deem, pronounce): S + Vcausative + DO + OC(adj). 'Rendered the precedent nugatory' = OC, not predicate adjective.", "Test causative vs. linking: can the verb be passivised with the DO becoming subject? 'The precedent was rendered nugatory' — yes, so 'rendered' is transitive (causative), not linking.", "In ditransitive sentences (grant, give, award): IO precedes DO in the base order. 'The court granted [IO the petitioner] [DO leave]'."], "traps": ["Classifying 'rendered' as a linking verb because it is followed by an adjective — linking verbs do not take direct objects and cannot be passivised without meaning change.", "In ditransitive sentences, identifying the FIRST post-verb noun as the DO — it is the IO. Ask 'V + what?' for DO."]}, "Number Agreement": {"w": "8-10%", "tips": ["'A number of + plural noun' → PLURAL verb (notional concord, quantifier phrase meaning 'several'). 'The number of + plural noun' → SINGULAR verb ('number' is the true head noun).", "The a/the distinction before 'number of' is the diagnostic for singular vs. plural agreement — the single most tested agreement trap in competitive exams.", "Collective nouns: INTERNAL CONSISTENCY is mandatory. Unitary interpretation → singular verb + 'its'. Distributive interpretation → plural verb + 'their'. Never mix."], "traps": ["Applying singular agreement to 'a number of' by treating 'number' as the literal head — 'a number of' is a fixed quantifier phrase.", "Participial modifiers revealing multiple members ('comprising three judges') do not change the grammatical number of the head noun ('bench') — agreement is with the head, not the modifier."]}, "Noun Phrases": {"w": "10-12%", "tips": ["To identify the full extent of a complex subject NP: find the MAIN VERB first, then everything to its left is the subject NP, including embedded content complement clauses.", "Deverbal NP → underlying clause mapping: NOUN → verb, by-PP → agent/subject, of-complement → patient/object, attributive adjective → manner adverb.", "Compound noun vs. syntactic NP: stress test (LAWmaker = compound; maker of LAW = phrase), internal modification test, semantic compositionality test."], "traps": ["Truncating complex subject NPs at the first noun, missing embedded content complement clauses within the NP boundary.", "Classifying attributive nouns ('government policy') as adjectives — attributive nouns cannot be used predicatively (*'the policy is government') or comparatively (*'more government policy')."]}, "Countable and Uncountable Nouns": {"w": "12-14%", "tips": ["COERCION / TYPE-SHIFTING: uncountable nouns can be used countably when the speaker intends bounded, individuated instances ('three silences', 'two beers'). This is productive, not an error.", "Legal register: 'damage' (uncountable = harm) vs. 'damages' (plurale tantum = monetary award). 'Damages' cannot take cardinal numerals or uncountable quantifiers.", "Test coercion: does the context imply a BOUNDED INSTANCE? If yes, countable use of an uncountable noun is grammatically motivated."], "traps": ["Marking every instance of a typically uncountable noun used countably as an error — coercion is a productive and intentional process, not a mistake.", "Treating 'damages' as simply the plural of 'damage' and applying cardinal numerals ('three damages') — legal 'damages' is a plurale tantum."]}, "Proper Nouns": {"w": "6-8%", "tips": ["Capitalised DEFINED TERMS in legal documents remain common nouns grammatically; capitalisation is a drafting convention, not a grammatical word-class transformation.", "Defined terms differ from proper nouns: proper nouns acquire uniqueness by naming conventions independent of any document; defined terms acquire uniqueness only within a specific document.", "Antonomasia (proper noun used for a class: 'the Einstein of jurisprudence') signals a shift from proper to common noun function, marked by the article."], "traps": ["Classifying ALL capitalised words as proper nouns — defined terms, sentence-initial words, and institutional titles retain their grammatical common-noun status.", "Claiming that capitalisation alone converts a common noun into a proper noun — proper noun status is determined by referential uniqueness, not typography."]}, "Case of Nouns": {"w": "8-10%", "tips": ["Modern English nouns retain ONLY the genitive/possessive case morphologically (apostrophe-s). All other case relationships are expressed through word order and prepositions.", "Genitive + gerund ('the court’s having refused') is the formally prescribed standard; accusative + present participle ('the court refusing') is the colloquial alternative.", "The subjective genitive before a gerund marks the noun as the SUBJECT of the gerundial action — it is not a possessive of ownership."], "traps": ["Claiming Modern English nouns retain multiple morphological cases (nominative, accusative, dative) — only the genitive is morphologically marked for nouns.", "Treating 'the court’s refusing' as archaic or non-standard — it is the formally prescribed construction in legal and academic writing."]}, "Types of Nouns": {"w": "6-8%", "tips": ["The same phonological form can be multiple nouns: 'justice' (abstract quality), 'a justice' (countable common, a judge), 'Justice [Name]' (proper noun, title). Apply article test, pluralisability test, and capitalisation test simultaneously.", "Attributive nouns (government policy, law reform) remain nouns in modifier position; they do not become adjectives. Test: can they be used predicatively? (*'the policy is government' — no) → attributive noun.", "Zero conversion vs. derivation: if the form is UNCHANGED, it is zero conversion; if a suffix changes the form (act→action), it is derivation."], "traps": ["Classifying all instances of an abstract-sounding word as abstract nouns, ignoring article use and pluralisability as diagnostics.", "Classifying attributive nouns as adjectives because they occupy the pre-nominal modifier position — adjectives can be predicative; attributive nouns cannot."]}, "Collective Nouns": {"w": "6-8%", "tips": ["Participial modifiers revealing plural membership ('comprising three judges') do NOT change the grammatical number of the collective noun head. Agreement is with the head noun, not the modifier.", "Collective noun agreement consistency: verb number must match pronoun number. Singular verb (has) → singular pronoun (its); plural verb (have) → plural pronoun (their).", "British English PERMITS both singular and plural agreement with collective nouns depending on unitary vs. distributive interpretation. Neither is universally required."], "traps": ["Applying plural agreement to a sentence containing a singular collective noun because a plural modifier is visible ('comprising three judges') — the subject head determines agreement.", "Claiming British English ALWAYS uses plural verbs with collective nouns — this is a simplification. Unitary interpretation requires singular agreement."]}, "Compound Nouns": {"w": "6-8%", "tips": ["STRESS TEST: primary stress on first element = compound (LAWmaker); stress on head/last noun = syntactic phrase (maker of LAW).", "Latin legal phrases: pluralise the HEAD NOUN according to Latin declension rules. 'Corpus juris' → 'corpora juris' (corpus/corpora, neuter second declension). Do not pluralise the genitive modifier.", "INTERNAL MODIFICATION TEST: compounds resist it (*'fast-lawmaker'); syntactic phrases allow it ('an efficient maker of constitutional law')."], "traps": ["Applying English regular pluralisation to Latin legal phrases ('corpus jurises') — use Latin declension rules for the head noun.", "Pluralising the genitive modifier instead of the head noun ('corpus jurium' — changes meaning to 'body of laws' vs. 'bodies of law')."]}, "Abstract and Concrete Nouns": {"w": "6-8%", "tips": ["Contextual classification: apply the five-senses test to the SPECIFIC SENTENCE, not to the word's most common sense. 'The light of reason' = abstract (metaphorical use of physically concrete 'light').", "When 'justice' takes an indefinite article ('a justice'), it is a COUNTABLE COMMON NOUN (a judge), not an abstract noun. Pluralisability and article use are primary diagnostics.", "Abstract nouns resist: indefinite article in generic use, direct plural with cardinal numbers, and sensory predication ('you can see/touch justice' is anomalous)."], "traps": ["Classifying ALL instances of an abstract-sounding word as abstract, ignoring contextual evidence (article, plural, metaphorical use).", "Confusing the 'importance' of a concept with the abstract noun category — abstract nouns are defined by intangibility, not by importance or significance."]}, "Appositive Nouns": {"w": "6-8%", "tips": ["Advanced appositive analysis: identify (1) restrictive/non-restrictive, (2) internal structure (pre-modifiers, head noun, post-modifiers), (3) semantic relationship to main noun.", "Non-restrictive test: COMMA presence + REMOVAL test. Removal test checks CORE IDENTIFICATION, not full semantic content — supplementary evaluative description does not make an appositive restrictive.", "Appositive NP vs. relative clause: relative clause has a finite verb and a relativiser; appositive NP has neither. A long, complex NP without a finite verb is still an NP, not a clause."], "traps": ["Arguing that removing a non-restrictive appositive 'changes meaning' and therefore it is restrictive — the test is CORE IDENTIFICATION (which entity?), not full meaning preservation.", "Confusing adverbs within appositives ('arguably the most significant') with comparative structures — 'arguably' is a modal adverb modifying the superlative degree of the NP."]}}
</script>

<div id="score-bar">
  <div class="sb-inner">
    <span class="sb-label">Live Score</span>
    <div class="pill p-score">Score <span class="pn" id="lv-s">0.00</span></div>
    <div class="pill p-ok">✓ <span class="pn" id="lv-ok">0</span></div>
    <div class="pill p-bad">✗ <span class="pn" id="lv-bad">0</span></div>
    <div class="pill p-skip">— <span class="pn" id="lv-sk">0</span></div>
  </div>
</div>

<div id="app">
  <div class="masthead">
    <div class="mast-rule top"></div>
    <h1>Nouns in English Grammar</h1>
    <div class="mast-sub">Topper Examination</div>
    <div class="mast-meta">20 Questions · Topper Difficulty · +1 / −0.25 Marking</div>
    <div class="mast-rule bot"></div>
  </div>

  <div class="dots-wrap" id="dots-wrap"></div>
  <div id="quiz-wrap"></div>

  <div class="finish-wrap">
    <button class="btn-finish" onclick="finishTest()">Finish Test &amp; See Results</button>
  </div>

  <div id="results">
    <div class="res-card">
      <div class="res-hdr">
        <h2>Examination Complete</h2>
        <div class="orn">✶ ✶ ✶</div>
        <div class="grade" id="r-grade">—</div>
        <div class="grade-lbl" id="r-lbl"></div>
        <div class="stats">
          <div class="stat s-score">  <span class="stat-n" id="r-sc">0</span>  <span class="stat-l">Score</span></div>
          <div class="stat s-correct"><span class="stat-n" id="r-ok">0</span>  <span class="stat-l">Correct</span></div>
          <div class="stat s-wrong">  <span class="stat-n" id="r-bad">0</span> <span class="stat-l">Wrong</span></div>
          <div class="stat s-skip">   <span class="stat-n" id="r-skip">0</span><span class="stat-l">Skipped</span></div>
        </div>
      </div>
      <div class="res-body">
        <h3 class="sec-hdr">Subtopic Performance</h3>
        <div class="st-bars" id="st-bars"></div>
        <h3 class="sec-hdr">Personalised Study Roadmap</h3>
        <div class="roadmap" id="roadmap"></div>
        <div class="restart-wrap"><button class="btn-restart" onclick="location.reload()">Retake Examination</button></div>
      </div>
    </div>
  </div>
</div>

<script>
var QUESTIONS = JSON.parse(document.getElementById('qdata').textContent);
var RD = JSON.parse(document.getElementById('rddata').textContent);
var S = {
  chosen: new Array(QUESTIONS.length).fill(null),
  checked: new Array(QUESTIONS.length).fill(false),
  skipped: new Array(QUESTIONS.length).fill(false),
  score: 0, ok: 0, bad: 0, skip: 0
};
window.addEventListener('DOMContentLoaded', function() { buildDots(); buildCards(); });

function buildDots() {
  var h = '', i;
  for (i = 0; i < QUESTIONS.length; i++)
    h += '<button class="dot" id="dot-' + i + '" data-qi="' + i + '">' + (i + 1) + '</button>';
  var dw = document.getElementById('dots-wrap');
  dw.innerHTML = h;
  dw.addEventListener('click', function(e) {
    var b = e.target.closest('.dot');
    if (b) { var el = document.getElementById('card-' + b.getAttribute('data-qi'));
             if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' }); }
  });
}
function updateDot(qi) {
  var d = document.getElementById('dot-' + qi); d.className = 'dot';
  if (S.skipped[qi]) { d.classList.add('d-skip'); return; }
  if (!S.checked[qi]) return;
  d.classList.add(S.chosen[qi] === QUESTIONS[qi].correct ? 'd-ok' : 'd-bad');
}

function buildCards() {
  var h = '', i;
  for (i = 0; i < QUESTIONS.length; i++) h += cardHTML(QUESTIONS[i], i);
  var qw = document.getElementById('quiz-wrap');
  qw.innerHTML = h;
  qw.addEventListener('click', function(e) {
    var b;
    b = e.target.closest('.opt');
    if (b && !b.classList.contains('locked')) {
      pick(parseInt(b.getAttribute('data-qi')), b.getAttribute('data-lbl')); return;
    }
    b = e.target.closest('.btn-check');
    if (b && !b.disabled) { checkQ(parseInt(b.getAttribute('data-qi'))); return; }
    b = e.target.closest('.btn-skip');
    if (b) { skipQ(parseInt(b.getAttribute('data-qi'))); }
  });
}
function cardHTML(q, i) {
  var oh = '', j;
  for (j = 0; j < q.options.length; j++) {
    var o = q.options[j];
    oh += '<button class="opt" id="opt-' + i + '-' + o.label + '"'
        + ' data-qi="' + i + '" data-lbl="' + o.label + '">'
        + '<span class="opt-lt">' + o.label + '</span>'
        + '<span>' + xe(o.text) + '</span></button>';
  }
  return '<div class="card" id="card-' + i + '">'
    + '<div class="q-hdr"><div class="q-num">' + (i + 1) + '</div>'
    + '<div class="q-tags"><div class="q-sub">' + xe(q.subtopic) + '</div>'
    + '<div class="q-diff">' + q.difficulty + '</div></div></div>'
    + '<div class="q-stem">' + q.stem + '</div>'
    + '<div class="options">' + oh + '</div>'
    + '<div class="action-row">'
    + '<button class="btn btn-check" id="chk-' + i + '" data-qi="' + i + '" disabled>Check Answer</button>'
    + '<button class="btn btn-skip" id="skp-' + i + '" data-qi="' + i + '">Skip</button>'
    + '</div><div id="exp-' + i + '"></div></div>';
}

function pick(qi, lbl) {
  if (S.checked[qi] || S.skipped[qi]) return;
  S.chosen[qi] = lbl;
  var opts = QUESTIONS[qi].options, j;
  for (j = 0; j < opts.length; j++) {
    var b = document.getElementById('opt-' + qi + '-' + opts[j].label);
    if (opts[j].label === lbl) b.classList.add('sel'); else b.classList.remove('sel');
  }
  document.getElementById('chk-' + qi).disabled = false;
}

function checkQ(qi) {
  if (S.checked[qi]) return;
  S.checked[qi] = true;
  var q = QUESTIONS[qi], ch = S.chosen[qi], ok = (ch === q.correct), j;
  if (ok) { S.score += 1; S.ok++; } else { S.score -= 0.25; S.bad++; }
  for (j = 0; j < q.options.length; j++) {
    var b = document.getElementById('opt-' + qi + '-' + q.options[j].label);
    b.classList.add('locked'); b.classList.remove('sel');
    if (q.options[j].label === q.correct) b.classList.add('c-ok');
    else if (q.options[j].label === ch && !ok) b.classList.add('c-bad');
    else b.classList.add('c-dim');
  }
  document.getElementById('chk-' + qi).style.display = 'none';
  document.getElementById('skp-' + qi).style.display = 'none';
  renderExp(qi, ch, ok, q); bar(); updateDot(qi);
}

function skipQ(qi) {
  if (S.checked[qi] || S.skipped[qi]) return;
  S.skipped[qi] = true; S.skip++;
  var opts = QUESTIONS[qi].options, j;
  for (j = 0; j < opts.length; j++)
    document.getElementById('opt-' + qi + '-' + opts[j].label).classList.add('locked', 'c-dim');
  document.getElementById('chk-' + qi).style.display = 'none';
  document.getElementById('skp-' + qi).style.display = 'none';
  bar(); updateDot(qi);
  document.getElementById('exp-' + qi).innerHTML =
    '<div class="exp-wrap"><div class="exp-hdr">'
    + '<span class="exp-verdict">— Skipped · No mark</span>'
    + '<span class="exp-delta d-zero">0</span></div>'
    + '<div class="exp-body" style="padding:12px 18px;">'
    + '<p style="font-size:.88rem;color:var(--ink-muted);font-style:italic;">'
    + 'Correct answer: <strong style="color:var(--gold)">' + xe(QUESTIONS[qi].correct) + '</strong></p>'
    + '</div></div>';
}

function renderExp(qi, ch, ok, q) {
  var verdict = ok ? '✓ Correct — +1 mark' : '✗ Incorrect — Correct answer: ' + q.correct;
  var dt = ok ? '+1' : '−0.25', dc = ok ? 'd-pos' : 'd-neg';
  var oh = '', j;
  for (j = 0; j < q.options.length; j++) {
    var o = q.options[j];
    var isCor = (o.label === q.correct), isWrg = (o.label === ch && !isCor);
    var cls = isCor ? 'oe oe-ok' : (isWrg ? 'oe oe-bad' : 'oe');
    var ico = isCor ? '✓' : (isWrg ? '✗' : '·');
    oh += '<div class="' + cls + '">'
        + '<div class="oe-lbl"><span class="oe-ltr">' + ico + ' ' + o.label + '.</span> ' + xe(o.text) + '</div>'
        + '<div style="margin-top:3px">' + xe(o.explanation) + '</div></div>';
  }
  document.getElementById('exp-' + qi).innerHTML =
    '<div class="exp-wrap"><div class="exp-hdr">'
    + '<span class="exp-verdict">' + verdict + '</span>'
    + '<span class="exp-delta ' + dc + '">' + dt + '</span></div>'
    + '<div class="exp-body"><div class="opt-exps">' + oh + '</div>'
    + '<div class="insight-row">'
    + '<div class="insight i-top"><div class="ins-title">★ Topper\'s Rule</div>'
    + '<div class="ins-text">' + xe(q.topperRule) + '</div></div>'
    + '<div class="insight i-err"><div class="ins-title">⚠ Common Mistake</div>'
    + '<div class="ins-text">' + xe(q.commonMistake) + '</div></div>'
    + '</div></div></div>';
}

function bar() {
  document.getElementById('lv-s').textContent = S.score.toFixed(2);
  document.getElementById('lv-ok').textContent = S.ok;
  document.getElementById('lv-bad').textContent = S.bad;
  document.getElementById('lv-sk').textContent = S.skip;
}

function finishTest() {
  var i;
  for (i = 0; i < QUESTIONS.length; i++) if (!S.checked[i] && !S.skipped[i]) skipQ(i);
  document.getElementById('quiz-wrap').style.display = 'none';
  document.getElementById('dots-wrap').style.display = 'none';
  document.querySelector('.finish-wrap').style.display = 'none';
  var res = document.getElementById('results');
  res.style.display = 'block';
  res.scrollIntoView({ behavior: 'smooth', block: 'start' });
  var pct = (S.score / QUESTIONS.length) * 100;
  var grade, lbl;
  if (pct >= 90) { grade = 'A+'; lbl = 'Outstanding — Examiner Standard'; }
  else if (pct >= 75) { grade = 'A'; lbl = 'Excellent — Well Prepared'; }
  else if (pct >= 60) { grade = 'B'; lbl = 'Good — Minor Gaps to Address'; }
  else if (pct >= 40) { grade = 'C'; lbl = 'Average — Focused Revision Required'; }
  else if (pct >= 20) { grade = 'D'; lbl = 'Below Average — Revise Fundamentals'; }
  else { grade = 'F'; lbl = 'Needs Comprehensive Revision'; }
  document.getElementById('r-grade').textContent = grade;
  document.getElementById('r-lbl').textContent = lbl;
  document.getElementById('r-sc').textContent = S.score.toFixed(2);
  document.getElementById('r-ok').textContent = S.ok;
  document.getElementById('r-bad').textContent = S.bad;
  document.getElementById('r-skip').textContent = S.skip;
  buildBars(); buildRoadmap();
}

function buildBars() {
  var map = {}, i;
  for (i = 0; i < QUESTIONS.length; i++) {
    var st = QUESTIONS[i].subtopic;
    if (!map[st]) map[st] = { total: 0, correct: 0 };
    map[st].total++;
    if (S.checked[i] && S.chosen[i] === QUESTIONS[i].correct) map[st].correct++;
  }
  window._stMap = map;
  var keys = Object.keys(map), h = '', k;
  for (k = 0; k < keys.length; k++) {
    var nm = keys[k], d = map[nm];
    var p = d.total ? Math.round((d.correct / d.total) * 100) : 0;
    var fc = p >= 70 ? 'f-hi' : p >= 40 ? 'f-mid' : 'f-lo';
    h += '<div><div class="st-top"><span class="st-nm">' + xe(nm) + '</span>'
       + '<span class="st-sc">' + d.correct + '/' + d.total + ' (' + p + '%)</span></div>'
       + '<div class="st-track"><div class="st-fill ' + fc + '" style="width:0%" data-t="' + p + '"></div></div></div>';
  }
  document.getElementById('st-bars').innerHTML = h;
  setTimeout(function() {
    var els = document.querySelectorAll('.st-fill[data-t]'), f;
    for (f = 0; f < els.length; f++) els[f].style.width = els[f].getAttribute('data-t') + '%';
  }, 120);
}

function buildRoadmap() {
  var map = window._stMap || {};
  var keys = Object.keys(map).sort(function(a, b) {
    var pa = map[a].total ? map[a].correct / map[a].total : 0;
    var pb = map[b].total ? map[b].correct / map[b].total : 0;
    return pa - pb;
  });
  var h = '', k;
  for (k = 0; k < keys.length; k++) {
    var nm = keys[k], d = map[nm];
    var p = d.total ? d.correct / d.total : 0;
    var pri = p < 0.5 ? 'High' : p < 0.75 ? 'Medium' : 'Low';
    var pc = pri === 'High' ? 'rp-hi' : pri === 'Medium' ? 'rp-mid' : 'rp-lo';
    var bc = pri === 'High' ? 'bh' : pri === 'Medium' ? 'bm' : 'bl';
    var rd = RD[nm] || { w: '—', tips: [], traps: [] };
    var tips = '', traps = '', t;
    for (t = 0; t < rd.tips.length; t++) tips += '<li>' + xe(rd.tips[t]) + '</li>';
    for (t = 0; t < rd.traps.length; t++) traps += '<li>' + xe(rd.traps[t]) + '</li>';
    h += '<div class="rm ' + pc + '">'
       + '<div class="rm-top">' + xe(nm) + '<span class="rm-badge ' + bc + '">' + pri + ' Priority</span></div>'
       + '<div class="rm-w">Exam Weight: ' + xe(rd.w) + '</div>'
       + '<div class="rm-grid">'
       + '<div><div class="rm-ct">Study Tips</div><ul class="rm-list">' + tips + '</ul></div>'
       + '<div><div class="rm-ct">Examiner Traps</div><ul class="rm-list">' + traps + '</ul></div>'
       + '</div></div>';
  }
  document.getElementById('roadmap').innerHTML = h;
}

function xe(s) {
  if (typeof s !== 'string') return '';
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;')
          .replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

</script>
