      "Note that 'say' never takes a direct personal object: 'She said to me' (correct) but not 'She said me' — unlike 'tell,' which requires a personal object."
    ],
    "traps": [
      "The omission of the object after 'warn' and 'remind' ('warned to submit' instead of 'warned them to submit') is the most common error — examiners exploit this frequently.",
      "Students confuse 'suggest + gerund' with 'suggest + obj + to-inf' and write 'suggested him to leave' — this pattern simply does not exist in standard English."
    ]
  },
  "Conditional Sentences": {
    "w": "9-11%",
    "tips": [
      "Memorise the three standard conditionals: zero (universal truth), first (real/possible), second (hypothetical present/future), third (hypothetical past).",
      "For mixed conditionals, identify which clause refers to the past and which to the present — then apply past perfect for the past element and 'would + base verb' for the present element.",
      "In formal/legal contexts, 'should' appears in the 'if' clause of first conditionals: 'If you should require assistance, contact us.' This is not a second conditional."
    ],
    "traps": [
      "Examiners blend second and third conditional elements to create plausible-looking mixed conditionals — students accept sentences where both clauses are in the same time frame as mixed conditionals.",
      "The word 'if' does not always introduce a conditional: 'I wonder if she is here' is an embedded question (indirect speech), not a conditional sentence."
    ]
  },
  "Verb Tenses — Sequence of Tenses": {
    "w": "8-10%",
    "tips": [
      "Learn the systematic back-shift: present → past, past simple → past perfect, will → would, can → could, may → might.",
      "Universal truths and scientific facts do NOT back-shift: 'He said that the earth revolves around the sun' — present tense is retained.",
      "In reported questions, the word order must convert from interrogative to declarative order, and the auxiliary verb must be removed or shifted back."
    ],
    "traps": [
      "Retaining 'will' in reported speech ('she said she will come') instead of back-shifting to 'would' is the single most common sequence-of-tenses error in competitive tests.",
      "Examiners insert a definite past time adverb ('yesterday,' 'last week') into a present-perfect or past-perfect clause to see if students catch the incompatibility."
    ]
  },
  "Ergative Verbs": {
    "w": "5-7%",
    "tips": [
      "Common ergative verbs to memorise: open, close, break, melt, freeze, sink, burn, cook, move, change, grow, develop. These alternate between transitive and intransitive without a passive.",
      "Test for ergativity: can you say both 'X verbed Y' (transitive) and 'Y verbed' (intransitive, same meaning direction)? If yes, the verb is ergative.",
      "Ergative intransitive constructions ('the door opened') are NOT passives — they have no auxiliary 'was/were' and no 'by' agent phrase. This distinction is critical."
    ],
    "traps": [
      "Examiners present 'the door was opened' (passive) alongside 'the door opened' (ergative intransitive) and ask students to identify the grammatical difference — the distinction lies in the presence of the auxiliary.",
      "Students confuse ergative verbs with reflexive constructions — 'the door opened' does not mean 'the door opened itself' (which is reflexive); it simply describes a change of state."
    ]
  },
  "Non-Finite Verbs — Participles": {
    "w": "8-10%",
    "tips": [
      "The subject of a participial phrase must be the same as the grammatical subject of the main clause immediately following it — always check this agreement.",
      "Absolute constructions (weather permitting, all things considered) are the only legitimate exception to the rule that participial phrases must have a clear local subject.",
      "Present participles indicate simultaneous or ongoing action; perfect participles ('having done') indicate a prior action. Choose the form that correctly sequences events."
    ],
    "traps": [
      "Dangling participles often 'sound natural' in speech — examiners deliberately choose plausible-sounding sentences where the participial phrase modifies an inanimate subject that cannot logically perform the action.",
      "The misplaced participle (placed too far from its intended noun) is confused with the dangling participle — in a dangling participle, there is no logical subject at all, whereas in a misplaced one, the correct subject exists but is in the wrong position."
    ]
  },
  "Verb Aspects — Habitual Past": {
    "w": "7-9%",
    "tips": [
      "The rule is absolute: 'would' for habitual past actions ONLY; 'used to' for both habitual past actions and past states. When in doubt, 'used to' is always safe.",
      "List of common past-state verbs that require 'used to' (not 'would'): be, have, own, live, know, believe, want, love, hate, like, prefer.",
      "Note that 'used to' implies the habit or state no longer continues; if the habit still continues, use the present continuous or present simple instead."
    ],
    "traps": [
      "Examiners use stative verbs ('own,' 'be,' 'know') after 'would' to test whether students know that 'would' is limited to dynamic repeated actions only.",
      "Confusing 'used to do' (past habit, no longer done) with 'be used to doing' (accustomed to, possibly ongoing) — these two constructions have entirely different meanings."
    ]
  },
  "Verb Patterns — Catenative Verbs": {
    "w": "6-8%",
    "tips": [
      "All primary catenative verbs (seem, appear, tend, happen, fail, manage, afford, refuse, pretend, claim) take the to-infinitive as their complement — no exceptions.",
      "The perfect infinitive ('to have done') after a catenative indicates that the complementing action occurred before the time of the catenative verb.",
      "The progressive infinitive ('to be doing') after a catenative indicates that the complementing action is simultaneous with the time of the catenative verb."
    ],
    "traps": [
      "Students write 'tend doing' by analogy with habitual-behaviour verbs like 'keep doing' or 'enjoy doing' — 'tend' is exclusively a to-infinitive catenative.",
      "Examiners mix catenative verbs with complex objects: 'He seemed to have been working all night' — the combination of perfect + progressive infinitive after a catenative can confuse students into choosing simpler but incorrect forms."
    ]
  }
}
