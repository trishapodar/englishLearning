<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subject Dashboard</title>
    
    <style>
        /* 1. Essential Layout structure */
        body {
            display: flex;
            margin: 0;
            height: 100vh;
            overflow: hidden;
        }

        /* 2. Bare-minimum Toggle Button positioning (No custom colors) */
        #toggle-btn {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 1000;
            cursor: pointer;
        }

        /* 3. Panel mechanics (No background colors or borders added) */
        #left-panel {
            width: 250px; /* You can adjust this if your style.css uses a different width */
            transition: width 0.3s ease; 
            overflow-x: hidden; 
            white-space: normal; 
            padding-top: 40px; /* Just to ensure the top link isn't hidden behind the button */
        }

        /* 4. The "Collapsed" state */
        #left-panel.collapsed {
            width: 0;
        }

        /* 5. Main content fills the rest of the space */
        #main-panel {
            flex-grow: 1; 
            display: flex;
            flex-direction: column;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <button id="toggle-btn">☰ Menu</button>

    <nav id="left-panel">
        <div class="nav-group">
            <a href="subject.html" target="content-frame" class="nav-item indent-1">English</a>
            <a href="english/noun/noun_learn_guide.html" target="content-frame" class="nav-item indent-2">Noun</a>
            <a href="english/noun/nouns_mcq_foundational.html" target="content-frame" class="nav-item indent-3">Foundational MCQ</a>
            <a href="english/noun/nouns_mcq_advanced.html" target="content-frame" class="nav-item indent-3">Advanced MCQ</a>
            <a href="english/noun/nouns_mcq_topper.html" target="content-frame" class="nav-item indent-3">Topper MCQ</a>
            <a href="english/noun/nouns_mcq_mixed_difficulty.html" target="content-frame" class="nav-item indent-3">Mixed Difficulty MCQ</a>
        </div>
        <div class="nav-group">
            <a href="subject.html" target="content-frame" class="nav-item indent-1">General Affairs</a>
            <a href="general_affairs/CLAT_Weekly_Digest_March_17_23_2026.html" target="content-frame" class="nav-item indent-2">Weekly 17 to 23 March 2026</a>
        </div>
    </nav>

    <main id="main-panel">
        <iframe name="content-frame" src="subject.html">
        </iframe>
    </main>

    <script>
        const toggleBtn = document.getElementById('toggle-btn');
        const leftPanel = document.getElementById('left-panel');

        toggleBtn.addEventListener('click', () => {
            leftPanel.classList.toggle('collapsed');
        });
    </script>

</body>
</html>
